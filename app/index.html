<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════════════════
  Fund Ledger — donations & disbursements ledger for a single fund.

  Built from the bizdocs "basis" standalone starter (see CLAUDE.md/DESIGN.md),
  with one deliberate architectural deviation, decided with the user and
  documented in FUND_LEDGER_PLAN.md: this app runs from file:// with NO server,
  so it cannot fetch() a config.yml. Instead:

    - The BOOT CONFIG (branding + localisation + seed defaults) is embedded
      inline in this file — see the <script type="text/yaml" id="boot-config">
      block just below, kept near the top of the file so it is easy to edit.
    - The OPERATIONAL config lives as config.yml INSIDE the ledger data folder,
      read/written through the File System Access API, and edited in the app's
      Configuration tab.

  Chromium-only (Chrome / Vivaldi / Edge): the File System Access API does not
  exist in Firefox or Safari. ID-card extraction reuses capture.js verbatim
  from kbenestad/idcardreader (see assets/capture.js).
  ════════════════════════════════════════════════════════════════════════════
-->

.idc-drop { border: 1px dashed var(--accent-border); border-radius: var(--radius); background: var(--accent-soft);
  padding: 22px; text-align: center; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.idc-drop.is-over { border-color: var(--accent); background: var(--surface-3); }

.idc-croptools { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
.idc-croptools__angle { font-size: var(--fs-sm); color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 3.5ch; text-align: center; }
.idc-stage { position: relative; display: inline-block; max-width: 100%; line-height: 0;

.idc-stage__img { display: block; max-width: 100%; cursor: crosshair; }
.idc-crop { position: absolute; border: 2px solid var(--accent); cursor: move; }
.idc-crop-mask { position: absolute; inset: 0; background: rgba(20,24,30,.45); pointer-events: none; }
.idc-crop__h { position: absolute; width: 12px; height: 12px; background: var(--accent);
  border: 2px solid #fff; border-radius: 50%; }
.idc-crop__h--nw { left: -7px; top: -7px; cursor: nwse-resize; }
.idc-crop__h--ne { right: -7px; top: -7px; cursor: nesw-resize; }
.idc-crop__h--sw { left: -7px; bottom: -7px; cursor: nesw-resize; }
.idc-crop__h--se { right: -7px; bottom: -7px; cursor: nwse-resize; }
.idc-crop__h--n { left: 50%; top: -7px; transform: translateX(-50%); cursor: ns-resize; }
.idc-crop__h--s { left: 50%; bottom: -7px; transform: translateX(-50%); cursor: ns-resize; }
.idc-crop__h--w { left: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
.idc-crop__h--e { right: -7px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }

.idc-thumbs { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }

.idc-thumb .n { text-align: center; font-size: var(--fs-small); color: var(--text-muted); }

@media (max-width: 640px){ .idc-fieldrow { grid-template-columns: 1fr; } }
.idc-regimg { width: 120px; max-height: 80px; object-fit: contain; border: 1px solid var(--border); border-radius: 4px; background: var(--surface-3); }

.idc-flabel { font-size: var(--fs-label); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--text-muted); }

<!-- ══════════════════════════════════════════════════════════════════════════
     SEED: the config.yml written into a brand-new ledger folder (verbatim).
     After that, the copy in the folder is authoritative and is what the
     Configuration tab edits. Field spec follows FUND_LEDGER_BRIEF.md §Tabs.
     ══════════════════════════════════════════════════════════════════════════ -->
<script type="text/yaml" id="seed-config">
# =============================================================================
# Fund Ledger — ledger configuration
# =============================================================================
# This file lives inside the ledger folder and is edited in the app's
# Configuration tab (or by hand). It defines the fund, the entry modes, and
# every field on the four record forms.
#
# Field keys:
#   fieldname : unique name (also usable as the {fieldname} token in templates)
#   label     : text shown on the form and in record files
#   type      : text | textarea | date | number | drop-down | random-generator | reference
#   required  : yes | no                       (default no)
#   text      : max character length           (type text)
#   textarea  : visible lines                  (type textarea)
#   date      : past-only | future-only | YYYY-MM-DD---YYYY-MM-DD
#   number_range   : N---N
#   symbols        : none | before | after | currency   (currency = fund currency)
#   symbols_print  : literal symbol to print before/after the number
#   drop-down      : ["value, Label", …] | countries | months | <list name>
#   dropdown_search: yes | no                  (searchable input instead of a select)
#   reference      : beneficiary | donor | donation | disbursement
#   reference_limit: all-records | same-id-only
#   show_if        : fieldname=value           (field only shows for that value)
#   from_id        : ID-template field id (or a list of ids, joined with spaces)
#                    that pre-fills this field in ID Card Reader mode

show-config-tab: yes             # yes|no — set to no to hide the Configuration tab

fund:
  name: "Fund Ledger"
  currency-code: "USD"
  currency-symbol: "$"
  currency-position: before      # before | after

beneficiary:
  mode: plaintext                # plaintext | idcardreader
  id-template: unhcr-thailand-id-card
  display-id: unhcr-case-no     # field surfaced as ID prefix in beneficiary dropdowns
  fields:
    - { fieldname: name, label: "Name", type: text, required: yes }
    - { fieldname: date-of-birth, label: "Date of birth", type: date, date: past-only, from_id: date-of-birth }
    - { fieldname: sex, label: "Sex", type: drop-down, drop-down: sexes, from_id: sex }
    - { fieldname: country-of-origin, label: "Country of origin", type: drop-down, drop-down: countries, dropdown_search: yes, from_id: country-of-origin }
    - { fieldname: unhcr-case-no, label: "UNHCR case file no.", type: text, from_id: case-number }
    - { fieldname: unhcr-individual-id, label: "UNHCR individual ID", type: text, from_id: individual-id-number }
    - { fieldname: unhcr-case-status, label: "UNHCR case status", type: drop-down, drop-down: case-statuses }
    - { fieldname: bank, label: "Bank", type: text }
    - { fieldname: bank-account, label: "Bank account number", type: text }
    - { fieldname: bank-account-holder, label: "Bank account holder", type: text }
    - { fieldname: phone, label: "Phone number", type: text }
    - { fieldname: email, label: "Email", type: text }

donor:
  mode: plaintext                # plaintext | idcardreader
  id-template: passport-mrz
  fields:
    - { fieldname: name, label: "Name", type: text, required: yes, from_id: [given-names, surname] }
    - { fieldname: date-of-birth, label: "Date of birth", type: date, date: past-only, from_id: dob }
    - { fieldname: sex, label: "Sex", type: drop-down, drop-down: sexes, from_id: sex }
    - { fieldname: country-of-origin, label: "Country of origin", type: drop-down, drop-down: countries, dropdown_search: yes, from_id: nationality }
    - { fieldname: phone, label: "Phone number", type: text }
    - { fieldname: email, label: "Email", type: text }

donation:
  folder-date-field: date-of-donation
  signatures: 1
  signature-labels:
    - "{donor-name}"
  template: |
    {logo}

    # {fund-name}

    ## Donation receipt — {reference}

    Date: **{date-of-donation}**

    Received with thanks from **{donor-name}** (donor {donor-id}) the amount of
    **{amount}**, given by {channel}.

    Purpose: {purpose}

    {notes}

    {signatures}
  fields:

<script>
(async function () {
'use strict';
/* Wrapped in an IIFE — globals from app.js ($, el, makeTabs, makeAccordion,
 * kbModal, …) and capture.js (captureToImage, ocrField, …) are visible here. */

let CFG;          // boot config (inline YAML above)
let lang = 'en';

const APP_VERSION = {
  version: '1.0.2',
  commit: 'c371311',
  prUrl: 'https://github.com/kbenestad/fundledger/pull/3',
  date: '22 July 2026',
};

let APP_CFG = null;        // fetched from config.yml (HTTP only; null on file://)
let LOGO_DATA_URL = null;  // base64 data URL of assets/logo.png|jpg|svg

/* Fetch and parse config.yml from alongside index.html (HTTP only). */
async function loadAppConfig() {
  try {
    const r = await fetch('config.yml');
    if (!r.ok) return;
    APP_CFG = jsyaml.load(await r.text()) || null;
  } catch (e) { /* file:// or missing — silently skip */ }
}

/* Load the app logo via fetch (works over HTTP, silently fails on file://). */
async function tryLoadLogo() {
  for (const src of ['assets/logo.png', 'assets/logo.jpg', 'assets/logo.svg']) {
    try {
      const r = await fetch(src);
      if (!r.ok) continue;
      const blob = await r.blob();
      LOGO_DATA_URL = await new Promise((res, rej) => {
        const rd = new FileReader();
        rd.onload = () => res(rd.result);
        rd.onerror = rej;
        rd.readAsDataURL(blob);
      });
      return;
    } catch (e) { /* try next extension */ }
  }
}

/* Load the logo from the open ledger folder via File System Access API.
 * Called after STATE.ledger is set; used when running on file:// where
 * fetch() cannot reach assets/. The logo file (logo.png, logo.jpg, or
 * logo.svg) must be placed in the ledger folder root. */
async function tryLoadLedgerLogo() {
  if (!STATE.ledger || !STATE.ledger.handle || LOGO_DATA_URL) return;
  for (const name of ['logo.png', 'logo.jpg', 'logo.svg']) {
    try {
      const fh = await STATE.ledger.handle.getFileHandle(name);
      const file = await fh.getFile();
      LOGO_DATA_URL = await new Promise((res, rej) => {
        const rd = new FileReader();
        rd.onload = () => res(rd.result);
        rd.onerror = rej;
        rd.readAsDataURL(file);
      });
      return;
    } catch (e) { /* try next extension */ }
  }
}

/* Build a <link> tag for a "bunny:Font Name:weights" or "google:Font Name:weights"
 * font spec. Returns '' if the spec is not recognised. */
function fontSpecToLinkTag(spec) {
  if (!spec) return '';
  const parts = String(spec).split(':');
  if (parts.length < 3) return '';
  const provider = parts[0].trim().toLowerCase();
  const name = parts[1].trim();
  const weights = parts[2].trim();
  if (!name || !weights) return '';
  if (provider === 'bunny') {
    const slug = name.toLowerCase().replace(/\s+/g, '-');
    return `<link rel="stylesheet" href="https://fonts.bunny.net/css?family=${slug}:${weights}">`;
  }
  if (provider === 'google') {
    const enc = name.replace(/\s+/g, '+');
    const wList = weights.split(',').join(';');
    return `<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=${enc}:wght@${wList}&display=swap">`;
  }
  return '';
}

/* Build minimal CSS custom-property overrides from an mdcms theme object,
 * scoped to --doc-* names used by generated standalone HTML documents. */
function docThemeCss(theme) {
  if (!theme || !theme.palette) return '';
  const vars = m => m ? [
    `--doc-accent:${m.primary||'#2f6fed'}`,
    `--doc-text:${m.ink||'#14181e'}`,
    `--doc-text-muted:${m['ink-muted']||'#5f6975'}`,
    `--doc-bg:${m.page||'#fff'}`,
    `--doc-surface:${m.surface||'#f4f6fa'}`,
  ].join(';') : '';
  const { light, dark } = theme.palette;
  let css = '';
  if (light) css += `:root{${vars(light)}}\n`;
  if (dark)  css += `@media(prefers-color-scheme:dark){:root{${vars(dark)}}}\n`;
  return css;
}

/* Fetch and parse the theme referenced by docsConfig.theme (path string or
 * inline object). Returns null silently on any error. */
async function loadDocTheme(docsConfig) {
  if (!docsConfig || !docsConfig.theme) return null;
  if (typeof docsConfig.theme === 'object') return docsConfig.theme;
  try {
    const r = await fetch(String(docsConfig.theme));
    if (!r.ok) return null;
    return jsyaml.load(await r.text());
  } catch (e) { return null; }
}

const S = (key, vars) => lookupString(CFG['ui-strings'], key, lang, CFG['default-code'], vars);
const esc = s => kbEsc(s == null ? '' : String(s));
const todayIso = () => new Date().toISOString().slice(0, 10);

/* ── Boot config (inline — file:// cannot fetch) ─────────────────────────── */
function readInlineYaml(id) {
  const node = document.getElementById(id);
  return node ? jsyaml.load(node.textContent) : null;
}
function readInlineText(id) {
  const node = document.getElementById(id);
  return node ? node.textContent.replace(/^\n/, '') : '';
}
function assertValidConfig(cfg) {
  if (!cfg || typeof cfg !== 'object' || !cfg.localisation) {
    throw new Error('The inline boot-config block did not parse to a valid configuration. '
      + 'Check the YAML in <script type="text/yaml" id="boot-config"> near the top of index.html.');
  }
}
function normaliseConfig() {
  const loc = CFG && CFG.localisation;
  if (!loc) return;
  const { table, languages, defaultCode } = buildLangTable(loc);
  CFG['default-code'] = defaultCode;
  CFG.languages = CFG.languages || languages;
  CFG['ui-strings'] = table;
}
function applyLang(lc) {
  lang = lc;
  const loc = CFG.localisation || {};
  const a = (loc[lc] && loc[lc].about) || (loc[CFG['default-code']] && loc[CFG['default-code']].about) || {};
  CFG['about-title'] = a.title || 'About';
  CFG['about-content'] = a.content || '';
  CFG['about-button'] = a.button || 'Close';
}
const showAboutModal = () => kbAbout({ title: CFG['about-title'], contentMD: CFG['about-content'], closeLabel: CFG['about-button'] });

/* Apply a `theme:` that is either an inline mdcms theme OBJECT (fetch-free —
 * the file:// path) or a path string (fetched; only works when HTTP-hosted).
 * See FUND_LEDGER_PLAN.md §3.1.1. */
async function applyThemeConfig(themeVal) {
  if (!themeVal) { kbApplyThemeToDoc(null, document); return; }
  if (typeof themeVal === 'object') { kbApplyThemeToDoc(themeVal, document); return; }
  await applyMdcmsTheme({ theme: themeVal }, '');
}

/* ── State ───────────────────────────────────────────────────────────────── */
const STATE = {
  tab: 0,
  ledger: null,        // { handle, name, config, index }
  pendingHandle: null, // stored handle awaiting a permission click
  lastSaved: { donation: null, disbursement: null },  // per-kind post-save panel
  idFlow: { beneficiary: null, donor: null },         // ID-capture flow state per kind
  personDraft: { beneficiary: null, donor: null },    // { prefill, photo, images, note }
  personEdit: { beneficiary: null, donor: null },     // entry being edited (from index)
  lang: { donation: null, disbursement: null },        // selected language code per money form
};

const SUBDIRS = ['Donors', 'Beneficiaries', 'Donations', 'Disbursements', 'Templates', 'Changelog'];
const SEED_TEMPLATES = [];   // templates are now in config.yml, not seeded as files

/* ── IndexedDB (persist the directory handle across sessions) ────────────── */
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('fundledger', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('kv');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').put(val, key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readonly');
    const rq = tx.objectStore('kv').get(key);
    rq.onsuccess = () => { db.close(); resolve(rq.result); };
    rq.onerror = () => { db.close(); reject(rq.error); };
  });
}
async function idbDel(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('kv', 'readwrite');
    tx.objectStore('kv').delete(key);
    tx.oncomplete = () => { db.close(); resolve(); };
    tx.onerror = () => { db.close(); reject(tx.error); };
  });
}

/* ── File System Access helpers ──────────────────────────────────────────── */
async function getDir(parent, name, create) {
  return parent.getDirectoryHandle(name, { create: !!create });
}
async function writeFileText(dir, name, text) {
  const fh = await dir.getFileHandle(name, { create: true });
  const w = await fh.createWritable();          // truncates
  await w.write(text);
  await w.close();
}
async function readFileTextOrNull(dir, name) {
  try {
    const fh = await dir.getFileHandle(name);
    return await (await fh.getFile()).text();
  } catch (e) { return null; }
}
async function appendFileLine(dir, name, line) {
  const fh = await dir.getFileHandle(name, { create: true });
  const file = await fh.getFile();
  const w = await fh.createWritable({ keepExistingData: true });
  await w.write({ type: 'write', position: file.size, data: line });
  await w.close();
}

/* ── Ledger: open / reconnect / seed ─────────────────────────────────────── */
async function openLedgerFolder() {
  let handle;
  try {
    handle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    if (e && e.name === 'AbortError') return;   // user cancelled the picker
    await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
    return;
  }
  await connectLedger(handle);
}

async function connectLedger(handle) {
  try {
    for (const d of SUBDIRS) await getDir(handle, d, true);

    // config.yml — seed on first open, then the folder copy is authoritative.
    let cfgText = await readFileTextOrNull(handle, 'config.yml');
    let seeded = false;
    if (cfgText == null) { cfgText = readInlineText('seed-config'); await writeFileText(handle, 'config.yml', cfgText); seeded = true; }
    let lcfg;
    try { lcfg = jsyaml.load(cfgText); } catch (e) {
      await kbAlert({ title: 'Error', message: S('config-parse-error', { error: e.message }) });
      return;
    }
    if (!lcfg || typeof lcfg !== 'object') {
      await kbAlert({ title: 'Error', message: S('config-parse-error', { error: 'not a YAML mapping' }) });
      return;
    }

    // Ledger.html — read the embedded index, or start fresh.
    let index = null;
    const ledgerText = await readFileTextOrNull(handle, 'Ledger.html');
    if (ledgerText != null) index = extractEmbeddedJson(ledgerText, 'ledger-index');
    if (!index) {
      index = { version: 1, counters: { beneficiary: 0, donor: 0 }, beneficiaries: [], donors: [], donations: [], disbursements: [] };
    }

    STATE.ledger = { handle, name: handle.name, config: lcfg, index };
    STATE.pendingHandle = null;
    await tryLoadLedgerLogo();
    await idbSet('root', handle);
    if (seeded) {
      await appendChangelog('ledger-created', '-', 'Ledger folder initialised');
      await writeLedgerIndex();
    } else if (ledgerText == null) {
      await writeLedgerIndex();
    }
    await applyThemeConfig(lcfg.theme || CFG.theme);
    render();
  } catch (e) {
    console.error(e);
    await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
  }
}

async function tryReconnect() {
  let handle = null;
  try { handle = await idbGet('root'); } catch (e) { /* no stored handle */ }
  if (!handle) return;
  try {
    const p = await handle.queryPermission({ mode: 'readwrite' });
    if (p === 'granted') { await connectLedger(handle); return; }
  } catch (e) { /* fall through to manual reconnect */ }
  STATE.pendingHandle = handle;   // needs a user-gesture requestPermission()
}

async function reconnectClick() {
  const handle = STATE.pendingHandle;
  if (!handle) return;
  try {
    const p = await handle.requestPermission({ mode: 'readwrite' });
    if (p === 'granted') { await connectLedger(handle); return; }
  } catch (e) {
    await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
  }
}

async function closeLedger() {
  const ok = await kbConfirm({ title: S('close-ledger-title'), message: S('close-ledger-message'), confirmLabel: S('btn-close-ledger'), cancelLabel: S('cancel') });
  if (!ok) return;
  await idbDel('root');
  STATE.ledger = null; STATE.pendingHandle = null;
  STATE.lastSaved = { donation: null, disbursement: null };
  STATE.idFlow = { beneficiary: null, donor: null };
  STATE.personDraft = { beneficiary: null, donor: null };
  STATE.personEdit = { beneficiary: null, donor: null };
  STATE.lang = { donation: null, disbursement: null };
  render();
}

/* ── Changelog (append-only versioning mechanism) ────────────────────────── */
async function appendChangelog(action, id, description) {
  const dir = await getDir(STATE.ledger.handle, 'Changelog', true);
  const entry = { ts: new Date().toISOString(), action, id, description };
  await appendFileLine(dir, 'changelog.jsonl', JSON.stringify(entry) + '\n');
}

/* ── Embedded-JSON helpers (index + record files carry their data) ───────── */
function extractEmbeddedJson(htmlText, id) {
  const m = htmlText.match(new RegExp('<script type="application/json" id="' + id + '">([\\s\\S]*?)<\\/script>'));
  if (!m) return null;
  try { return JSON.parse(m[1]); } catch (e) { return null; }
}
function embedJson(id, data) {
  return '<script type="application/json" id="' + id + '">'
    + JSON.stringify(data).replace(/</g, '\\u003c') + '<\/script>';
}

/* ── Money formatting (single fund currency — confirmed decision) ────────── */
function fundCfg() { return (STATE.ledger && STATE.ledger.config.fund) || {}; }
function fmtMoney(n) {
  const f = fundCfg();
  const num = formatAmount(parseAmount(n));
  const sym = f['currency-symbol'] != null ? String(f['currency-symbol']) : '';
  if (!sym) return num + (f['currency-code'] ? ' ' + f['currency-code'] : '');
  return f['currency-position'] === 'after' ? num + ' ' + sym : sym + num;
}

/* ── Drop-down machinery ─────────────────────────────────────────────────── */
function parsePair(s) {
  const str = String(s);
  const i = str.indexOf(',');
  if (i === -1) return { value: str.trim(), label: str.trim() };
  return { value: str.slice(0, i).trim(), label: str.slice(i + 1).trim() };
}
function ddOptions(field) {
  const src = field['drop-down'];
  if (Array.isArray(src)) return src.map(parsePair);
  if (src === 'countries') return KB_COUNTRIES.slice(1).map(([c, n]) => ({ value: c, label: n }));
  if (src === 'months') return MONTHS_FULL.map((m, i) => ({ value: String(i + 1), label: m }));
  const lists = (STATE.ledger && STATE.ledger.config['drop-down-lists']) || [];
  const list = lists.find(l => l && l.name === src);
  return list && Array.isArray(list.values) ? list.values.map(parsePair) : [];
}
function ddLabelFor(field, value) {
  if (value == null || value === '') return '';
  const opt = ddOptions(field).find(o => o.value === String(value));
  return opt ? opt.label : String(value);
}

/* ── Reference numbers & IDs ─────────────────────────────────────────────── */
function genReference() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const taken = new Set([...(idx().donations), ...(idx().disbursements)].map(r => r.reference));
  for (let attempt = 0; attempt < 50; attempt++) {
    const buf = new Uint32Array(6);
    crypto.getRandomValues(buf);
    const ref = [...buf].map(v => chars[v % chars.length]).join('');
    if (!taken.has(ref)) return ref;
  }
  return uid().slice(-6).toUpperCase();
}
function idx() { return STATE.ledger.index; }
function nextPersonId(kind) {
  const n = (idx().counters[kind] || 0) + 1;
  return (kind === 'beneficiary' ? 'B-' : 'D-') + String(n).padStart(4, '0');
}
function fileSafeName(s) {
  // Keep letters/digits/spaces (the brief's "B-NNNN_Lastname Firstname.html"
  // format has a space); strip filesystem-hostile characters.
  return String(s || '').replace(/[\\/:*?"<>|#%&{}$!'@+`=]/g, '').replace(/\s+/g, ' ').trim().slice(0, 60);
}

/* ══════════════════════════════════════════════════════════════════════════
   CONFIG-DRIVEN FORM RENDERER (all record forms are built from config fields)
   ══════════════════════════════════════════════════════════════════════════ */
/* Concatenate all searchable text values from a person's field values so the
 * index entry can be searched by phone, case number, etc. */
function buildPersonSearch(kind, values) {
  if (!values) return '';
  const fields = (STATE.ledger.config[kind] || {}).fields || [];
  return fields
    .filter(f => f && f.fieldname &&
      ['text', 'number', 'date', 'drop-down'].includes(String(f.type || '').replace(/\s+/g, '-')))
    .map(f => String(values[f.fieldname] || ''))
    .filter(Boolean)
    .join(' ');
}

/* Build the display label for a person entry. Prepends the configured
 * display-id field value (e.g. UNHCR case no.) when the kind's config has
 * a display-id key. */
function personLabel(person, kind) {
  const key = (STATE.ledger.config[kind] || {})['display-id'];
  const prefix = key && person.displayId ? person.displayId + ' · ' : '';
  return prefix + person.id + ' — ' + person.name;
}

/* Rich item list for a person reference field: { value, label, search }.
 * search combines every stored text field so the combo can filter on
 * names, phone numbers, case numbers, etc. */
function refPersonItems(field) {
  const kind = field.reference;
  const list = kind === 'beneficiary' ? idx().beneficiaries : idx().donors;
  return list.map(p => ({
    value: p.id,
    label: personLabel(p, kind),
    search: [p.id, p.name, p.displayId || '', p.search || ''].join(' '),
  }));
}

function buildConfigForm(fields, opts = {}) {
  const rows = [];   // { field, wrap, getValue, setValue, setError, visible }
  const grid = el('div', { className: 'kb-grid cols-2' });
  const changeHooks = [];

  function fieldRow(field) {
    const wrap = el('div', { className: 'kb-field' });
    wrap.appendChild(el('span', { className: 'kb-label' }, field.label || field.fieldname));
    let input, getValue, setValue;
    const type = String(field.type || 'text').replace(/\s+/g, '-');

    if (type === 'textarea') {
      input = el('textarea', { className: 'kb-textarea', rows: parseInt(field.textarea, 10) || 3 });
      getValue = () => input.value.trim();
      setValue = v => { input.value = v == null ? '' : String(v); };
      wrap.style.gridColumn = '1 / -1';
      wrap.appendChild(input);
    } else if (type === 'date') {
      input = el('input', { className: 'kb-input', type: 'date' });
      const c = String(field.date || '');
      if (c === 'past-only') input.max = todayIso();
      else if (c === 'future-only') input.min = todayIso();
      else { const m = c.match(/^(\d{4}-\d{2}-\d{2})---(\d{4}-\d{2}-\d{2})$/); if (m) { input.min = m[1]; input.max = m[2]; } }
      getValue = () => input.value;
      setValue = v => { input.value = normaliseDate(v) || v || ''; };
      wrap.appendChild(input);
    } else if (type === 'number') {
      const row = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } });
      input = el('input', { className: 'kb-input num', inputmode: 'decimal' });
      row.appendChild(input);
      let sym = '';
      if (field.symbols === 'currency') sym = fundCfg()['currency-symbol'] || fundCfg()['currency-code'] || '';
      else if (field.symbols === 'before' || field.symbols === 'after') sym = field.symbols_print || '';
      if (sym) {
        const tag = el('span', { className: 'fl-muted' }, sym);
        if (field.symbols === 'before' || field.symbols === 'currency') row.insertBefore(tag, input); else row.appendChild(tag);
      }
      getValue = () => input.value.trim();
      setValue = v => { input.value = v == null ? '' : String(v); };
      wrap.appendChild(row);
    } else if (type === 'drop-down') {
      const options = ddOptions(field);
      if (kbTruthy(field.dropdown_search)) {
        const listId = uid();
        input = el('input', { className: 'kb-input', list: listId, placeholder: S('select-placeholder') });
        const dl = el('datalist', { id: listId });
        options.forEach(o => dl.appendChild(el('option', { value: o.label })));
        wrap.append(input, dl);
        getValue = () => {
          const t = input.value.trim();
          if (!t) return '';
          const hit = options.find(o => o.label.toLowerCase() === t.toLowerCase() || o.value.toLowerCase() === t.toLowerCase());
          return hit ? hit.value : t;
        };
        setValue = v => {
          const s = v == null ? '' : String(v);
          const hit = options.find(o => o.value.toLowerCase() === s.toLowerCase() || o.label.toLowerCase() === s.toLowerCase());
          input.value = hit ? hit.label : s;
        };
      } else {
        input = el('select', { className: 'kb-select' });
        input.appendChild(el('option', { value: '' }, S('select-placeholder')));
        options.forEach(o => input.appendChild(el('option', { value: o.value }, o.label)));
        wrap.appendChild(input);
        getValue = () => input.value;
        setValue = v => {
          const s = v == null ? '' : String(v);
          const hit = options.find(o => o.value.toLowerCase() === s.toLowerCase() || o.label.toLowerCase() === s.toLowerCase());
          input.value = hit ? hit.value : '';
        };
      }
      input.addEventListener('change', () => changeHooks.forEach(h => h(field.fieldname)));
      input.addEventListener('input', () => changeHooks.forEach(h => h(field.fieldname)));
    } else if (type === 'random-generator') {
      const row = el('div', { style: { display: 'flex', gap: '8px' } });
      input = el('input', { className: 'kb-input fl-mono', readOnly: true, value: genReference() });
      const btn = el('button', { type: 'button', className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: () => { input.value = genReference(); } }, S('regenerate'));
      row.append(input, btn);
      getValue = () => input.value;
      setValue = v => { if (v) input.value = String(v); };
      wrap.appendChild(row);
    } else if (type === 'reference') {
      const isPersonRef = field.reference === 'beneficiary' || field.reference === 'donor';
      if (isPersonRef) {
        // Searchable combo: filters across name, ID, phone, case numbers, etc.
        const listId = uid();
        input = el('input', { className: 'kb-input', placeholder: S('select-placeholder'), autocomplete: 'off' });
        input.setAttribute('list', listId);
        const dl = el('datalist', { id: listId });
        wrap.append(input, dl);
        let _items = [], _selectedId = '';
        function _rebuildDl(query) {
          dl.innerHTML = '';
          const q = (query || '').toLowerCase();
          (_items.filter(o => !q || o.search.toLowerCase().includes(q)))
            .forEach(o => dl.appendChild(el('option', { value: o.label })));
        }
        input._setItems = items => {
          _items = items;
          const hit = _items.find(o => o.value === _selectedId);
          if (hit) input.value = hit.label;
          _rebuildDl('');
        };
        input.addEventListener('input', () => _rebuildDl(input.value));
        input.addEventListener('change', () => {
          const t = input.value.trim();
          const hit = _items.find(o => o.label === t);
          if (hit) { _selectedId = hit.value; input.value = hit.label; }
          else if (!t) _selectedId = '';
          _rebuildDl('');
          changeHooks.forEach(h => h(field.fieldname));
        });
        getValue = () => _selectedId;
        setValue = v => {
          _selectedId = v == null ? '' : String(v);
          const hit = _items.find(o => o.value === _selectedId);
          input.value = hit ? hit.label : '';
          _rebuildDl('');
        };
      } else {
        input = el('select', { className: 'kb-select' });
        wrap.appendChild(input);
        getValue = () => input.value;
        setValue = v => { input.value = v == null ? '' : String(v); };
        input.addEventListener('change', () => changeHooks.forEach(h => h(field.fieldname)));
      }
    } else { // text (default)
      input = el('input', { className: 'kb-input' });
      const max = parseInt(field.text, 10);
      if (max > 0) input.maxLength = max;
      getValue = () => input.value.trim();
      setValue = v => { input.value = v == null ? '' : String(v); };
      wrap.appendChild(input);
    }

    const err = el('div', { className: 'fl-muted', style: { color: 'var(--danger)', display: 'none' } });
    wrap.appendChild(err);
    const setError = msg => {
      err.textContent = msg || '';
      err.style.display = msg ? '' : 'none';
      input.classList.toggle('is-error', !!msg);
    };
    return { field, wrap, input, getValue, setValue, setError, visible: true };
  }

  (fields || []).forEach(f => { if (f && f.fieldname) { const r = fieldRow(f); rows.push(r); grid.appendChild(r.wrap); } });

  // Populate reference selects + wire same-id-only filtering and show_if.
  function personKindOf(field) { return field.reference === 'beneficiary' || field.reference === 'donor' ? field.reference : null; }
  const personRow = rows.find(r => r.field.type === 'reference' && personKindOf(r.field));

  function refOptions(field) {
    const target = field.reference;
    if (target === 'donation' || target === 'disbursement') {
      let recs = target === 'donation' ? idx().donations : idx().disbursements;
      if (field.reference_limit === 'same-id-only' && personRow) {
        const pid = personRow.getValue();
        recs = pid ? recs.filter(r => r.personId === pid) : [];
      }
      return recs.map(r => ({ value: r.reference, label: r.reference + ' — ' + (r.date || '') + ' · ' + fmtMoney(r.amount) }));
    }
    return [];
  }
  function refreshRefSelects() {
    rows.filter(r => r.field.type === 'reference').forEach(r => {
      if (r.input._setItems) {
        // Person reference combo — refresh searchable item list
        r.input._setItems(refPersonItems(r.field));
      } else {
        // Record reference select (donation / disbursement)
        const cur = r.input.value;
        r.input.innerHTML = '';
        r.input.appendChild(el('option', { value: '' }, S('select-placeholder')));
        refOptions(r.field).forEach(o => r.input.appendChild(el('option', { value: o.value }, o.label)));
        r.input.value = cur;
      }
    });
  }
  function applyShowIf() {
    rows.forEach(r => {
      const cond = r.field.show_if;
      if (!cond) return;
      const m = String(cond).match(/^\s*([^=]+?)\s*=\s*(.+?)\s*$/);
      if (!m) return;
      const controller = rows.find(x => x.field.fieldname === m[1]);
      const val = controller ? controller.getValue() : '';
      r.visible = String(val) === m[2];
      r.wrap.style.display = r.visible ? '' : 'none';
      if (!r.visible) r.setError(null);
    });
  }
  changeHooks.push(() => { refreshRefSelects(); applyShowIf(); });
  refreshRefSelects();
  applyShowIf();

  function validate() {
    let ok = true;
    rows.forEach(r => {
      if (!r.visible) return;
      r.setError(null);
      const v = r.getValue();
      const type = String(r.field.type || 'text').replace(/\s+/g, '-');
      if (kbTruthy(r.field.required) && !v) { r.setError(S('required-error')); ok = false; return; }
      if (!v) return;
      if (type === 'number') {
        const n = parseFloat(String(v).replace(/,/g, ''));
        if (isNaN(n)) { r.setError(S('invalid-number')); ok = false; return; }
        const m = String(r.field.number_range || '').match(/^(-?[\d.]+)---(-?[\d.]+)$/);
        if (m && (n < parseFloat(m[1]) || n > parseFloat(m[2]))) { r.setError(S('number-range-error', { min: m[1], max: m[2] })); ok = false; }
      }
      if (type === 'date') {
        if (r.input.min && v < r.input.min) { r.setError(S('date-early-error')); ok = false; }
        if (r.input.max && v > r.input.max) { r.setError(S('date-late-error')); ok = false; }
      }
    });
    return ok;
  }
  function getValues() {
    const out = {};
    rows.forEach(r => { if (r.visible) out[r.field.fieldname] = r.getValue(); });
    return out;
  }
  function setValues(map) {
    rows.forEach(r => { if (map && map[r.field.fieldname] != null) r.setValue(map[r.field.fieldname]); });
    refreshRefSelects(); applyShowIf();
  }
  function displayValue(fieldname) {
    const r = rows.find(x => x.field.fieldname === fieldname);
    if (!r) return '';
    const v = r.getValue();
    return r.field.type === 'drop-down' ? ddLabelFor(r.field, v) : v;
  }
  return { root: grid, rows, validate, getValues, setValues, displayValue };
}

/* Resolve a stored value map to display form (drop-down labels, money). */
function displayMap(fields, values) {
  const out = {};
  (fields || []).forEach(f => {
    if (!f || !f.fieldname) return;
    let v = values[f.fieldname];
    if (v == null) return;
    if (f.type === 'drop-down') v = ddLabelFor(f, v);
    if (f.type === 'number' && f.symbols === 'currency') v = fmtMoney(v);
    else if (f.type === 'number' && (f.symbols === 'before' || f.symbols === 'after') && f.symbols_print) {
      v = f.symbols === 'before' ? f.symbols_print + formatAmount(parseAmount(v)) : formatAmount(parseAmount(v)) + ' ' + f.symbols_print;
    }
    out[f.fieldname] = v;
  });
  return out;
}

/* ── Printable documents from Templates/*.md ─────────────────────────────── */
function fillTemplate(tplText, tokens) {
  return tplText.replace(/\{([a-z0-9_-]+)\}/gi, (m, key) =>
    tokens[key] != null ? String(tokens[key]) : (/^(?:signatures?:?|logo)$/i.test(key) ? m : ''));
}
function signatureBlockHtml(n, labels) {
  const count = Math.max(1, Math.min(2, parseInt(n) || 1));
  const block = (i) => {
    const label = labels && labels[i] != null ? String(labels[i]) : '';
    return `<div style="width:40%;">
    <div style="border-top:1.5px solid #14181e;margin-top:64px;"></div>
    <div style="font-size:12px;color:#5f6975;display:flex;justify-content:space-between;margin-top:4px;">
      <span>${label ? esc(label) : esc(S('sig-signature'))}</span><span>${esc(S('sig-date'))}</span>
    </div></div>`;
  };
  const wrap = count === 1
    ? 'display:flex;justify-content:center;margin-top:24px;'
    : 'display:flex;justify-content:space-between;margin-top:24px;';
  return `<div style="${wrap}">${Array.from({length:count}, (_, i) => block(i)).join('')}</div>`;
}
function documentHtml(md, title, docsConfig, logoDataUrl, langSpec) {
  docsConfig = docsConfig || {};

  // Language-specific overrides: font, line-height, direction
  const langFont = langSpec && langSpec.font || null;
  const langLineH = langSpec && langSpec['line-height'] || null;
  const langDir   = langSpec && langSpec.direction || 'ltr';
  const langCode  = langSpec && langSpec.code || 'en';

  // Font: language override > docsConfig font-body
  const bodySpec    = langFont || docsConfig['font-body'];
  const headingSpec = docsConfig['font-heading'];

  // Font link tags from "bunny:Font:weights" / "google:Font:weights" specs
  const fontLinks = [...new Set(
    [bodySpec, headingSpec].map(fontSpecToLinkTag).filter(Boolean)
  )].join('\n');

  // CSS font-family strings (kbParseFontName extracts the family from the spec)
  const bodyName    = kbParseFontName(bodySpec);
  const headingName = kbParseFontName(headingSpec) || bodyName;
  const fontBody    = bodyName    ? `"${bodyName}",sans-serif`    : 'system-ui,sans-serif';
  const fontHeading = headingName ? `"${headingName}",sans-serif` : fontBody;

  const fontSize   = Math.max(10, parseInt(docsConfig['font-size'])    || 15);
  const lineHeight = parseFloat(langLineH || docsConfig['line-height']) || 1.6;

  const maxW        = String(docsConfig['max-width-web']       || '720px');
  const maxWPdf     = String(docsConfig['max-width-pdf']       || '17cm');
  const logoMaxW    = String(docsConfig['logo-max-width-web']  || '200px');
  const logoMaxWPdf = String(docsConfig['logo-max-width-pdf']  || '5cm');

  const themeCss = docsConfig['_theme'] ? docThemeCss(docsConfig['_theme']) : '';
  const footSz   = Math.round(fontSize * 0.73);

  const sigCount  = docsConfig._sigCount  || 1;
  const sigLabels = docsConfig._sigLabels || [];

  let html = markdown(md);
  // {signatures} (count from config) or {signatures:N} (legacy, count from config overrides)
  html = html.replace(/(?:<p>)?\{signatures?(?::[12])?\}(?:<\/p>)?/g,
    () => signatureBlockHtml(sigCount, sigLabels));

  // {logo} is preserved through fillTemplate + markdown; substitute as raw HTML here
  const showLogo = kbTruthy(docsConfig.logo !== undefined ? docsConfig.logo : true);
  const logoHtml = (showLogo && logoDataUrl)
    ? `<img class="doc-logo" src="${logoDataUrl}" alt="">`
    : '';
  html = html.replace(/(?:<p>)?\{logo\}(?:<\/p>)?/gi, logoHtml);

  const footerHtml = docsConfig._footer
    ? `<div class="doc-foot">${markdown(docsConfig._footer)}</div>`
    : '';

  return `<!DOCTYPE html>
<html lang="${esc(langCode)}" dir="${esc(langDir)}">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>${esc(title)}</title>
${fontLinks}
<style>
${themeCss}:root{color-scheme:only light;--doc-accent:#2f6fed;--doc-text:#14181e;--doc-text-muted:#5f6975;--doc-bg:#fff;--doc-surface:#f4f6fa;--doc-border:#eef1f5;}
*{box-sizing:border-box;}
body{font-family:${fontBody};font-size:${fontSize}px;margin:0;padding:34px;color:var(--doc-text);background:var(--doc-bg);line-height:${lineHeight};direction:${langDir};}
.sheet{max-width:${maxW};margin:0 auto;}
h1{font-family:${fontHeading};font-size:${Math.round(fontSize*1.47)}px;margin:0 0 6px;}
h2{font-family:${fontHeading};font-size:${Math.round(fontSize*1.07)}px;margin:18px 0 8px;}
h3{font-family:${fontHeading};font-size:${Math.round(fontSize*0.93)}px;margin:14px 0 6px;}
p{margin:8px 0;}ul,ol{margin:0 0 0 20px;padding:0;}li{margin:2px 0;}ul+ul,ol+ol,ul+ol,ol+ul{margin-top:0;}a{color:var(--doc-accent);}
.doc-logo{max-width:${logoMaxW};height:auto;display:block;margin-bottom:16px;}
.doc-foot{margin-top:28px;padding-top:10px;border-top:1px solid var(--doc-border);font-size:${footSz}px;color:var(--doc-text-muted);}
@media print{body{padding:${docsConfig['padding-top-print'] ? docsConfig['padding-top-print'] + ' 0 0' : '0'};background:#fff;color:#000;}.sheet{max-width:${maxWPdf};}.doc-logo{max-width:${logoMaxWPdf};}ul,ol{margin:0 0 0 20px;padding:0;}li{margin:2px 0;}ul+ul,ol+ol,ul+ol,ol+ul{margin-top:0;}}
</style>
</head>
<body><div class="sheet">${html}
${footerHtml}</div></body>
</html>`;
}
function printHtml(html) {
  const f = el('iframe', { style: { position: 'fixed', right: '0', bottom: '0', width: '0', height: '0', border: '0' } });
  document.body.appendChild(f);
  f.onload = () => { try { f.contentWindow.focus(); f.contentWindow.print(); } catch (e) { console.warn(e); } setTimeout(() => f.remove(), 120000); };
  f.srcdoc = html;
}

/* ══════════════════════════════════════════════════════════════════════════
   RECORD CREATION (write order: record files → changelog → Ledger.html)
   ══════════════════════════════════════════════════════════════════════════ */
async function savePerson(kind, values, fields, extras) {
  const id = nextPersonId(kind);
  const name = fileSafeName(values.name || id);
  const fileName = id + '_' + name + '.html';
  const dirName = kind === 'beneficiary' ? 'Beneficiaries' : 'Donors';
  const dir = await getDir(STATE.ledger.handle, dirName, true);

  const disp = displayMap(fields, values);
  const fieldRows = [{ label: S('col-id'), value: id }]
    .concat(fields.filter(f => values[f.fieldname] != null && values[f.fieldname] !== '')
      .map(f => ({ label: f.label || f.fieldname, value: disp[f.fieldname] != null ? disp[f.fieldname] : values[f.fieldname] })));
  const html = recordPageHtml({
    title: id + ' — ' + (values.name || ''),
    subtitle: (kind === 'beneficiary' ? S('tab-beneficiary') : S('tab-donor')) + ' · ' + S('rec-generated-on') + ' ' + todayIso(),
    fieldRows,
    photo: extras && extras.photo || null,
    images: extras && extras.images || [],
    documents: [],
    jsonId: 'record-data',
    jsonData: { kind, id, name: values.name || '', created: todayIso(), values, fieldRows,
      photo: extras && extras.photo || null, images: extras && extras.images || [] },
  });
  // 1) record file
  await writeFileText(dir, fileName, html);
  // 2) changelog
  await appendChangelog(kind + '-created', id, (values.name || '') + ' (' + fileName + ')');
  // 3) index last
  idx().counters[kind] = (idx().counters[kind] || 0) + 1;
  const displayIdKey = (STATE.ledger.config[kind] || {})['display-id'];
  const entry = {
    id, name: values.name || '', file: dirName + '/' + fileName, created: todayIso(),
    search: buildPersonSearch(kind, values),
    displayId: displayIdKey ? (values[displayIdKey] || '') : '',
    fields: fieldRows,
  };
  (kind === 'beneficiary' ? idx().beneficiaries : idx().donors).push(entry);
  await writeLedgerIndex();
  return entry;
}

async function saveMoneyRecord(kind, form) {
  const block = STATE.ledger.config[kind] || {};
  const fields = block.fields || [];
  const values = form.getValues();
  const refField = fields.find(f => f.type === 'reference' && (f.reference === 'beneficiary' || f.reference === 'donor'));
  const personKind = refField ? refField.reference : (kind === 'donation' ? 'donor' : 'beneficiary');
  const personId = refField ? values[refField.fieldname] : '';
  const person = (personKind === 'donor' ? idx().donors : idx().beneficiaries).find(p => p.id === personId) || { id: personId, name: '' };

  const refFieldName = (fields.find(f => String(f.type).replace(/\s+/g, '-') === 'random-generator') || {}).fieldname;
  const reference = (refFieldName && values[refFieldName]) || genReference();
  const dateField = block['folder-date-field'];
  const recDate = (dateField && values[dateField]) || todayIso();
  const amountField = (fields.find(f => f.type === 'number') || {}).fieldname;
  const amount = amountField ? parseAmount(values[amountField]) : 0;

  const parentName = kind === 'donation' ? 'Donations' : 'Disbursements';
  const parent = await getDir(STATE.ledger.handle, parentName, true);
  const folderName = recDate + '_' + (personId || 'X') + '_' + reference;
  const folder = await getDir(parent, folderName, true);

  // Tokens for document templates: field values (display form) + derived.
  const disp = displayMap(fields, values);
  const tokens = {};
  fields.forEach(f => { if (f && f.fieldname) tokens[f.fieldname] = disp[f.fieldname] != null ? disp[f.fieldname] : (values[f.fieldname] || ''); });
  tokens['fund-name'] = fundCfg().name || 'Fund Ledger';
  tokens['reference'] = reference;
  tokens['generated-date'] = todayIso();
  tokens[personKind + '-id'] = person.id || '';
  tokens[personKind + '-name'] = person.name || '';
  if (amountField) tokens['amount'] = fmtMoney(amount);

  // Pick language spec from STATE (set by language selector in the form).
  const langs = STATE.ledger.config.languages || [];
  const langCode = STATE.lang[kind] || (langs.length > 0 ? langs[0].code : null);
  const langSpec = langs.find(l => l.code === langCode) || null;

  // Resolve template: config block.template (string or per-language map)
  // Falls back to Templates/ files via block.prints for existing ledgers.
  let md = null;
  const tplVal = block.template;
  if (typeof tplVal === 'string') {
    md = tplVal;
  } else if (tplVal && typeof tplVal === 'object') {
    md = (langCode && tplVal[langCode]) || Object.values(tplVal)[0] || null;
  }
  // Legacy fallback: use first entry of block.prints
  if (!md && block.prints && block.prints.length) {
    const tplDir = await getDir(STATE.ledger.handle, 'Templates', true);
    md = await readFileTextOrNull(tplDir, block.prints[0] + '.md');
  }

  // docsConfig: app-level config.yml first, ledger-level documents: overrides on top.
  const docsConfig = Object.assign({}, (APP_CFG && APP_CFG.documents) || {}, STATE.ledger.config.documents || {});
  const docTheme = await loadDocTheme(docsConfig);
  if (docTheme) docsConfig['_theme'] = docTheme;

  // Signatures: count from config; labels optionally per-language, with token substitution
  docsConfig._sigCount = parseInt(block.signatures) || 1;
  const rawLabels = (() => {
    const sl = block['signature-labels'];
    if (!sl) return [];
    if (Array.isArray(sl)) return sl;
    if (typeof sl === 'object' && langCode && sl[langCode]) return sl[langCode];
    if (typeof sl === 'object') return Object.values(sl)[0] || [];
    return [];
  })();
  docsConfig._sigLabels = rawLabels.map(l => fillTemplate(String(l), tokens));

  // Footer: optional per-language markdown, token-substituted
  const footerVal = docsConfig.footer;
  const footerMd = typeof footerVal === 'string' ? footerVal
    : (footerVal && typeof footerVal === 'object'
        ? ((langCode && footerVal[langCode]) || Object.values(footerVal)[0] || null)
        : null);
  if (footerMd) docsConfig._footer = fillTemplate(footerMd, tokens);

  const docs = [];
  if (md) {
    const docHtml = documentHtml(fillTemplate(md, tokens), reference, docsConfig, LOGO_DATA_URL, langSpec);
    docs.push({ name: reference + '.html', html: docHtml });
  }

  // 1) record folder + files
  for (const d of docs) await writeFileText(folder, d.name, d.html);
  const fieldRows = fields.filter(f => values[f.fieldname] != null && values[f.fieldname] !== '')
    .map(f => ({ label: f.label || f.fieldname, value: disp[f.fieldname] != null ? disp[f.fieldname] : values[f.fieldname] }));
  const recHtml = recordPageHtml({
    title: (kind === 'donation' ? S('tab-donation') : S('tab-disbursement')) + ' ' + reference,
    subtitle: person.id + ' — ' + person.name + ' · ' + recDate,
    fieldRows,
    photo: null, images: [],
    documents: docs.map(d => d.name),
    jsonId: 'record-data',
    jsonData: { kind, reference, personId: person.id, personName: person.name, date: recDate,
      amount, values, fieldRows, documents: docs.map(d => d.name), created: todayIso() },
  });
  await writeFileText(folder, 'record.html', recHtml);
  // 2) changelog
  await appendChangelog(kind + '-created', reference,
    (person.id ? person.id + ' ' : '') + fmtMoney(amount) + ' (' + parentName + '/' + folderName + ')');
  // 3) index last
  const entry = { reference, personId: person.id, personName: person.name, date: recDate, amount,
    folder: parentName + '/' + folderName, created: todayIso(),
    fields: fieldRows, documents: docs.map(d => d.name) };
  (kind === 'donation' ? idx().donations : idx().disbursements).push(entry);
  await writeLedgerIndex();

  return { reference, docs };
}

/* ── Rebuild the index by scanning record files (crash recovery) ─────────── */
async function rebuildIndex() {
  const root = STATE.ledger.handle;
  const fresh = { version: 1, counters: { beneficiary: 0, donor: 0 }, beneficiaries: [], donors: [], donations: [], disbursements: [] };
  for (const [dirName, kind, listKey] of [['Beneficiaries', 'beneficiary', 'beneficiaries'], ['Donors', 'donor', 'donors']]) {
    const dir = await getDir(root, dirName, true);
    for await (const entry of dir.values()) {
      if (entry.kind !== 'file' || !/\.html$/i.test(entry.name)) continue;
      const text = await (await entry.getFile()).text();
      const data = extractEmbeddedJson(text, 'record-data');
      if (!data || data.kind !== kind) continue;
      const displayIdKey2 = (STATE.ledger.config[kind] || {})['display-id'];
      fresh[listKey].push({
        id: data.id, name: data.name || '', file: dirName + '/' + entry.name, created: data.created || '',
        search: buildPersonSearch(kind, data.values),
        displayId: displayIdKey2 ? ((data.values || {})[displayIdKey2] || '') : '',
        fields: data.fieldRows || [],
      });
      const n = parseInt(String(data.id).replace(/^[BD]-/, ''), 10);
      if (n > fresh.counters[kind]) fresh.counters[kind] = n;
    }
    fresh[listKey].sort((a, b) => a.id.localeCompare(b.id));
  }
  for (const [dirName, kind, listKey] of [['Donations', 'donation', 'donations'], ['Disbursements', 'disbursement', 'disbursements']]) {
    const dir = await getDir(root, dirName, true);
    for await (const entry of dir.values()) {
      if (entry.kind !== 'directory') continue;
      let text = null;
      try { text = await (await (await entry.getFileHandle('record.html')).getFile()).text(); } catch (e) { continue; }
      const data = extractEmbeddedJson(text, 'record-data');
      if (!data || data.kind !== kind) continue;
      fresh[listKey].push({ reference: data.reference, personId: data.personId || '', personName: data.personName || '',
        date: data.date || '', amount: data.amount || 0, folder: dirName + '/' + entry.name, created: data.created || '',
        fields: data.fieldRows || [], documents: data.documents || [] });
    }
    fresh[listKey].sort((a, b) => String(a.date).localeCompare(String(b.date)));
  }
  STATE.ledger.index = fresh;
  await appendChangelog('index-rebuilt', '-', `beneficiaries=${fresh.beneficiaries.length} donors=${fresh.donors.length} donations=${fresh.donations.length} disbursements=${fresh.disbursements.length}`);
  await writeLedgerIndex();
  render();
  await kbAlert({ title: S('btn-rebuild-index'), message: S('rebuild-done', { b: fresh.beneficiaries.length, d: fresh.donors.length, don: fresh.donations.length, dis: fresh.disbursements.length }) });
}

/* ══════════════════════════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════════════════════════ */
function embeddedIdTemplate(name) {
  try {
    const tpl = readInlineYaml('idtpl-' + name);
    return tpl && typeof tpl === 'object' ? tpl : null;
  } catch (e) { return null; }
}

function buildIdFlowCard(kind, host) {
  // The flow keeps its own DOM inside `host` (full app re-renders would kill
  // the canvases mid-crop), and stores progress in STATE.idFlow[kind].
  const flow = STATE.idFlow[kind];
  host.innerHTML = '';
  if (!flow) return;
  const tpl = flow.tpl;

  const head = el('div', { className: 'kb-actbar', style: { marginBottom: '10px' } },
    el('button', { className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: () => { STATE.idFlow[kind] = null; render(); } }, S('start-over')));
  host.appendChild(head);

  const sides = el('div', { className: 'idc-sides' });
  host.appendChild(sides);
  const sideNames = ['front'].concat(tpl.back ? ['back'] : []);
  sideNames.forEach(side => {
    const box = el('div');
    box.appendChild(el('div', { className: 'idc-flabel', style: { marginBottom: '6px' } }, S(side === 'front' ? 'step-front' : 'step-back')));
    const inner = el('div');
    box.appendChild(inner);
    if (flow.sideCanvas[side]) {
      inner.appendChild(el('img', { className: 'idc-preview', src: canvasToDataURL(flow.sideCanvas[side], 'image/jpeg', 0.8) }));
      inner.appendChild(el('div', { className: 'kb-actbar', style: { marginTop: '8px' } },
        el('button', { className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: () => { flow.sideCanvas[side] = null; flow.results = null; buildIdFlowCard(kind, host); } }, S('recapture'))));
    } else {
      mountIdCapture(inner, tpl, side, canvas => { flow.sideCanvas[side] = canvas; flow.results = null; buildIdFlowCard(kind, host); });
    }
    sides.appendChild(box);
  });

  const ready = sideNames.every(s => flow.sideCanvas[s]);
  const bar = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const extractBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: () => runIdExtraction(kind, host) }, S('btn-extract'));
  extractBtn.disabled = !ready || flow.busy;
  bar.appendChild(extractBtn);
  if (flow.busy) bar.appendChild(el('span', { className: 'idc-muted' }, S('extracting')));
  host.appendChild(bar);

  if (flow.results) host.appendChild(buildIdReview(kind, host));
}

function mountIdCapture(host, tpl, side, onDone) {
  host.innerHTML = '';
  const drop = el('div', { className: 'idc-drop' });
  drop.appendChild(el('div', { className: 'hint' }, S('capture-hint')));
  const fileInput = el('input', { type: 'file', accept: 'image/*,application/pdf', style: { display: 'none' } });
  drop.append(el('button', { className: 'kb-btn kb-btn--primary', onClick: () => fileInput.click() }, S('btn-upload')), fileInput);
  host.appendChild(drop);
  const work = el('div', { style: { marginTop: '10px' } });
  host.appendChild(work);

  ['dragover', 'dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
    e.preventDefault();
    drop.classList.toggle('is-over', ev === 'dragover');
    if (ev === 'drop' && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  }));
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  async function handleFile(file) {
    work.innerHTML = '<p class="idc-muted">…</p>';
    let cap;
    try { cap = await captureToImage(file); }
    catch (e) { work.innerHTML = ''; work.appendChild(noteEl('error', e.message)); return; }
    if (cap.isPdf && cap.pageCount > 1) showPagePicker(cap); else showCropper(cap.canvas);
  }
  function showPagePicker(cap) {
    work.innerHTML = '';
    work.appendChild(el('p', { className: 'idc-muted' }, S('pick-page')));
    const thumbs = el('div', { className: 'idc-thumbs' });
    cap.thumbnails.forEach(t => {
      const cell = el('div', { className: 'idc-thumb', onClick: async () => { work.innerHTML = '<p class="idc-muted">…</p>'; showCropper(await cap.pickPage(t.page)); } });
      cell.append(el('img', { src: t.dataUrl }), el('div', { className: 'n' }, String(t.page)));
      thumbs.appendChild(cell);
    });
    work.appendChild(thumbs);
  }
  function showCropper(canvas) {
    work.innerHTML = '';
    const cropHost = el('div');
    work.appendChild(cropHost);
    const ctl = attachCropRotate(canvas, cropHost, { aspect: aspectRatioFor(tpl.aspect), allowOverflow: true });
    work.appendChild(el('div', { className: 'kb-actbar', style: { marginTop: '12px' } },
      el('button', { className: 'kb-btn kb-btn--primary', onClick: () => { const out = ctl.getResult(); ctl.destroy(); onDone(out); } }, S('use-this-image'))));
  }
}

async function runIdExtraction(kind, host) {
  const flow = STATE.idFlow[kind];
  const tpl = flow.tpl;
  flow.busy = true;
  buildIdFlowCard(kind, host);
  const ocrLang = tpl['ocr-language'] || CFG['ocr-language'] || 'eng';
  const out = [];
  const rawQr = {}, rawMrz = {};

  let mergedPayload = null;
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !flow.sideCanvas[side]) continue;
    for (const f of tpl[side].fields.filter(f => f.type === 'qr')) {
      const raw = decodeQr(cropRegion(flow.sideCanvas[side], f.region));
      rawQr[side] = raw;
      if (raw && tpl[side]['qr-parse']) {
        const parsed = parseQrPayload(raw, tpl[side]['qr-parse']);
        if (parsed) mergedPayload = Object.assign(mergedPayload || {}, parsed);
      }
    }
  }
  let mergedMrz = null;
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !flow.sideCanvas[side]) continue;
    for (const f of tpl[side].fields.filter(f => f.type === 'mrz')) {
      const raw = await ocrMrz(cropRegion(flow.sideCanvas[side], f.region));
      rawMrz[side] = raw;
      const parsed = parseMrzTd3(raw);
      if (parsed) mergedMrz = Object.assign(mergedMrz || {}, parsed);
    }
  }
  for (const side of ['front', 'back']) {
    if (!tpl[side] || !flow.sideCanvas[side]) continue;
    for (const f of tpl[side].fields) {
      const crop = cropRegion(flow.sideCanvas[side], f.region);
      const r = { id: f.id, label: f.label || f.id, type: f.type, side, calendar: f.calendar || 'gregorian',
        regionDataUrl: crop.toDataURL('image/jpeg', 0.8), ocrValue: '', qrValue: '', value: '', dateText: '',
        conflict: false, resolved: true, photoDataUrl: null };
      if (f.type === 'photo') {
        r.photoDataUrl = crop.toDataURL('image/jpeg', 0.85);
      } else if (f.type === 'qr') {
        r.value = rawQr[side] || '';
      } else if (f.type === 'mrz') {
        r.value = rawMrz[side] || '';
      } else if (f['mrz-key']) {
        const v = mergedMrz && mergedMrz[f['mrz-key']];
        r.value = v == null ? '' : (typeof v === 'boolean' ? (v ? 'OK' : 'MISMATCH') : String(v));
      } else {
        r.ocrValue = await ocrField(crop, ocrLang);
        if (f.type === 'date' && r.ocrValue) { r.dateText = r.ocrValue; r.value = normaliseDate(r.ocrValue, r.calendar) || r.ocrValue; }
        else r.value = r.ocrValue;
        if (f['qr-key'] && mergedPayload && mergedPayload[f['qr-key']] != null) {
          r.qrValue = mergedPayload[f['qr-key']];
          const norm = s => String(s || '').replace(/\s+/g, '').toLowerCase();
          if (r.qrValue && norm(r.ocrValue) !== norm(r.qrValue)) { r.conflict = true; r.resolved = false; r.value = ''; }
          else if (r.qrValue && !r.ocrValue) r.value = r.qrValue;
        }
      }
      out.push(r);
    }
  }
  flow.results = out;
  flow.rawQr = rawQr;
  flow.busy = false;
  buildIdFlowCard(kind, host);
}

function buildIdReview(kind, host) {
  const flow = STATE.idFlow[kind];
  const card = el('div', { style: { marginTop: '16px' } });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('section-review')));

  flow.results.forEach(r => {
    const isPhoto = r.type === 'photo';
    const row = el('div', { className: 'idc-fieldrow' + (isPhoto ? ' idc-photorow' : '') + (r.conflict && !r.resolved ? ' is-conflict' : '') });
    const src = isPhoto && r.photoDataUrl ? r.photoDataUrl : r.regionDataUrl;
    row.appendChild(el('div', null, el('img', { className: isPhoto ? 'idc-photoimg' : 'idc-regimg', src })));
    const mid = el('div');
    mid.appendChild(el('div', { className: 'idc-flabel', style: { marginBottom: '4px' } }, r.label));
    if (isPhoto) {
      mid.appendChild(el('p', { className: 'idc-muted' }, ''));
    } else if (r.conflict && !r.resolved) {
      mid.appendChild(el('p', { className: 'idc-muted' }, S('conflict-note')));
      const cand = el('div', { className: 'idc-cand' });
      const pick = v => { r.value = v; r.conflict = false; r.resolved = true; buildIdFlowCard(kind, host); };
      [[S('source-ocr'), r.ocrValue], [S('source-qr'), r.qrValue]].forEach(([srcLabel, v]) => {
        const b = el('button', { className: 'kb-btn kb-btn--ghost', onClick: () => pick(v) });
        b.append(el('span', { className: 'src' }, srcLabel), el('span', null, v || S('field-empty')));
        cand.appendChild(b);
      });
      mid.appendChild(cand);
      const input = el('input', { className: 'kb-input', placeholder: S('field-empty') });
      input.addEventListener('input', () => { if (input.value.trim()) { r.value = input.value.trim(); r.conflict = false; r.resolved = true; } });
      mid.appendChild(input);
    } else {
      if (r.type === 'date' && r.dateText && r.dateText !== r.value) {
        mid.appendChild(el('div', { className: 'idc-muted', style: { marginBottom: '3px' } }, S('source-ocr') + ': ' + r.dateText));
      }
      const input = el('input', { className: 'kb-input', value: r.value || '' });
      input.addEventListener('input', () => { r.value = input.value; });
      mid.appendChild(input);
    }
    row.appendChild(mid);
    card.appendChild(row);
  });

  ['front', 'back'].forEach(side => {
    if (flow.rawQr && flow.rawQr[side]) {
      card.appendChild(el('div', { className: 'idc-flabel', style: { marginTop: '14px', marginBottom: '4px' } }, S('raw-qr-label')));
      card.appendChild(el('div', { className: 'idc-rawqr' }, flow.rawQr[side]));
    }
  });

  const unresolved = flow.results.filter(r => r.conflict && !r.resolved).length;
  const actions = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const applyBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: () => applyIdResults(kind) }, S('btn-apply-id'));
  applyBtn.disabled = unresolved > 0;
  actions.append(el('div', { className: 'spacer' }), applyBtn);
  card.appendChild(actions);
  return card;
}

function applyIdResults(kind) {
  const flow = STATE.idFlow[kind];
  const block = STATE.ledger.config[kind] || {};
  const byId = {};
  flow.results.forEach(r => { byId[r.id] = r; });

  // Map extracted values onto config fields via from_id (string or list).
  const prefill = {};
  (block.fields || []).forEach(f => {
    if (!f || !f.from_id) return;
    const ids = Array.isArray(f.from_id) ? f.from_id : [f.from_id];
    const parts = ids.map(id => (byId[id] && byId[id].value) || '').filter(Boolean);
    if (parts.length) prefill[f.fieldname] = parts.join(' ');
  });

  // First photo-type field = person photo; card sides go to the images list.
  const photoField = flow.results.find(r => r.type === 'photo' && r.photoDataUrl && !/qr/i.test(r.id));
  const images = [];
  ['front', 'back'].forEach(side => {
    if (flow.sideCanvas[side]) images.push({ label: flow.tpl.name + ' · ' + S(side === 'front' ? 'step-front' : 'step-back'), src: flow.sideCanvas[side].toDataURL('image/jpeg', 0.72) });
  });
  STATE.personDraft[kind] = { prefill, photo: photoField ? photoField.photoDataUrl : null, images, note: S('id-data-applied') };
  STATE.idFlow[kind] = null;
  render();
}

/* ── Token reference modal ────────────────────────────────────────────────── */
function showTokensModal(tokens) {
  const body = el('div', { className: 'kb-modal__body' });
  const table = el('table', { style: { width: '100%', borderCollapse: 'collapse' } });
  tokens.forEach(({ token, desc }) => {
    const tr = el('tr');
    const tdCode = el('td', { style: { padding: '5px 8px', whiteSpace: 'nowrap', verticalAlign: 'middle' } });
    const code = el('code', { style: {
      fontFamily: 'monospace', background: 'var(--surface-2)',
      padding: '2px 6px', borderRadius: '4px', fontSize: '13px' } }, '{' + token + '}');
    const copyBtn = el('button', { type: 'button', className: 'kb-btn kb-btn--ghost kb-btn--sm',
      style: { marginLeft: '8px' }, onClick: async () => {
        try { await navigator.clipboard.writeText('{' + token + '}'); } catch (e) {}
        close(token);
      } }, S('rec-copy'));
    tdCode.append(code, copyBtn);
    tr.append(tdCode, el('td', { style: {
      padding: '5px 8px', color: 'var(--text-muted)',
      fontSize: 'var(--fs-small)', verticalAlign: 'middle' } }, desc));
    table.appendChild(tr);
  });
  body.appendChild(table);

  const overlay = el('div', { className: 'kb-overlay' });
  const modal   = el('div', { className: 'kb-modal' });
  const hdr     = el('div', { className: 'kb-modal__hdr' });
  hdr.appendChild(el('span', null, S('available-tokens')));
  const footer   = el('div', { className: 'kb-modal__footer' });
  const closeBtn = el('button', { type: 'button', className: 'kb-btn kb-btn--ghost',
    onClick: () => close(null) }, S('btn-close'));
  footer.appendChild(closeBtn);
  modal.append(hdr, body, footer);
  overlay.appendChild(modal);

  let done = false;
  function close(val) {
    if (done) return; done = true;
    overlay.remove();
    document.removeEventListener('keydown', onKey);
  }
  function onKey(e) { if (e.key === 'Escape') close(null); }
  overlay.addEventListener('click', e => { if (e.target === overlay) close(null); });
  document.addEventListener('keydown', onKey);
  document.body.appendChild(overlay);
  closeBtn.focus();
}

/* ── Open Ledger.html in a new window (blob URL) ─────────────────────────── */
async function openLedgerHtml() {
  const text = await readFileTextOrNull(STATE.ledger.handle, 'Ledger.html');
  if (!text) return;
  const blob = new Blob([text], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (win) setTimeout(() => URL.revokeObjectURL(url), 60000);
}

/* ── Update an existing person record in place ────────────────────────────── */
async function updatePerson(kind, entry, values, fields, extras) {
  const dirName = kind === 'beneficiary' ? 'Beneficiaries' : 'Donors';
  const dir = await getDir(STATE.ledger.handle, dirName, false);
  const fileName = entry.file.split('/').pop();

  const disp = displayMap(fields, values);
  const fieldRows = [{ label: S('col-id'), value: entry.id }]
    .concat(fields.filter(f => values[f.fieldname] != null && values[f.fieldname] !== '')
      .map(f => ({ label: f.label || f.fieldname, value: disp[f.fieldname] != null ? disp[f.fieldname] : values[f.fieldname] })));
  const html = recordPageHtml({
    title: entry.id + ' — ' + (values.name || ''),
    subtitle: (kind === 'beneficiary' ? S('tab-beneficiary') : S('tab-donor')) + ' · ' + S('rec-generated-on') + ' ' + entry.created,
    fieldRows,
    photo: extras && extras.photo || null,
    images: extras && extras.images || [],
    documents: [],
    jsonId: 'record-data',
    jsonData: { kind, id: entry.id, name: values.name || '', created: entry.created, values, fieldRows,
      photo: extras && extras.photo || null, images: extras && extras.images || [] },
  });
  await writeFileText(dir, fileName, html);
  await appendChangelog(kind + '-updated', entry.id, (values.name || '') + ' (' + fileName + ')');

  const list = kind === 'beneficiary' ? idx().beneficiaries : idx().donors;
  const i = list.findIndex(p => p.id === entry.id);
  const displayIdKey = (STATE.ledger.config[kind] || {})['display-id'];
  if (i >= 0) {
    list[i] = Object.assign({}, list[i], {
      name: values.name || '',
      search: buildPersonSearch(kind, values),
      displayId: displayIdKey ? (values[displayIdKey] || '') : '',
      fields: fieldRows,
    });
  }
  await writeLedgerIndex();
}
