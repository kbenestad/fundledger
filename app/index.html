  const wrap = el('div', { className: 'fl-tab-body' });
  if (!STATE.ledger) { wrap.appendChild(noteEl('info', S('not-connected-note'))); return wrap; }
  const block = STATE.ledger.config[kind] || {};
  const list = kind === 'beneficiary' ? idx().beneficiaries : idx().donors;
  const displayIdKey = block['display-id'];

  /* ── Edit mode ─────────────────────────────────────────────────────── */
  if (STATE.personEdit[kind]) {
    const entry = STATE.personEdit[kind];
    const card = el('div', { className: 'kb-card' });
    card.appendChild(el('div', { className: 'kb-card__title' }, S('edit-person-title', { id: entry.id })));
    const form = buildConfigForm(block.fields || []);
    form.setValues(entry._values || {});
    card.appendChild(form.root);
    const acts = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
    const cancelBtn = el('button', { className: 'kb-btn kb-btn--ghost', onClick: () => { STATE.personEdit[kind] = null; render(); } }, S('cancel'));
    const saveBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: async () => {
      if (!form.validate()) return;
      saveBtn.disabled = true;
      try {
        await updatePerson(kind, entry, form.getValues(), block.fields || [], { photo: entry._photo || null, images: entry._images || [] });
        STATE.personEdit[kind] = null;
        render();
        await kbAlert({ title: entry.id, message: S('person-updated', { id: entry.id }), icon: KB_ICON.info });
      } catch (e) {
        console.error(e);
        saveBtn.disabled = false;
        await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
      }
    } }, S('save'));
    acts.append(cancelBtn, el('div', { className: 'spacer' }), saveBtn);
    card.appendChild(acts);
    wrap.appendChild(card);
    return wrap;
  }

  /* ── Existing records (accordion, collapsed by default) ────────────── */
  const listContent = el('div');
  if (!list.length) {
    listContent.appendChild(el('p', { className: 'fl-muted' }, S('no-persons')));
  } else {
    const table = el('table', { className: 'fl-table' });
    const head = el('tr');
    const cols = [S('col-id')];
    if (displayIdKey) cols.push(displayIdKey);
    cols.push(S('col-name'), S('col-created'), '');
    cols.forEach(h => head.appendChild(el('th', null, h)));
    table.appendChild(head);
    list.forEach(p => {
      const tr = el('tr');
      tr.appendChild(el('td', { className: 'fl-mono' }, p.id));
      if (displayIdKey) tr.appendChild(el('td', { className: 'fl-mono' }, p.displayId || ''));
      tr.append(el('td', null, p.name), el('td', null, p.created));
      const editBtn = el('button', { className: 'kb-btn kb-btn--ghost kb-btn--sm', onClick: async () => {
        editBtn.disabled = true;
        try {
          const dirName = kind === 'beneficiary' ? 'Beneficiaries' : 'Donors';
          const dir = await getDir(STATE.ledger.handle, dirName, false);
          const fileName = p.file.split('/').pop();
          const text = await readFileTextOrNull(dir, fileName);
          const data = text ? extractEmbeddedJson(text, 'record-data') : null;
          STATE.personEdit[kind] = Object.assign({}, p, {
            _values: data && data.values || {},
            _photo: data && data.photo || null,
            _images: data && data.images || [],
          });
          render();
        } catch (e) {
          console.error(e);
          editBtn.disabled = false;
          await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
        }
      } }, S('btn-edit'));
      tr.appendChild(el('td', null, editBtn));
      table.appendChild(tr);
    });
    listContent.appendChild(table);
  }
  const acc = makeAccordion(
    [{ label: S(kind === 'beneficiary' ? 'beneficiaries-title' : 'donors-title') + ' (' + list.length + ')', content: listContent }],
    { openAllLabel: S('open-all'), closeAllLabel: S('close-all') }
  );
  wrap.appendChild(acc);

  /* ── New record ────────────────────────────────────────────────────── */
  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S(kind === 'beneficiary' ? 'new-b-title' : 'new-d-title')));

  const idMode = block.mode === 'idcardreader';
  const draft = STATE.personDraft[kind];

  if (idMode && !draft && !STATE.idFlow[kind]) {
    const actions = el('div', { className: 'kb-actions' });
    actions.appendChild(el('button', { className: 'kb-btn kb-btn--primary', onClick: async () => {
      const choice = await kbModal({
        title: S('choose-entry-title'), bodyHTML: kbMessageHTML(S('choose-entry-message')), dismissValue: null,
        buttons: [
          { label: S('mode-idcard'), value: 'id', variant: 'kb-btn--primary' },
          { label: S('mode-plaintext'), value: 'plain', variant: 'kb-btn--ghost' },
        ],
      });
      if (choice === 'id') {
        const tpl = embeddedIdTemplate(block['id-template']);
        if (!tpl) {
          await kbAlert({ title: 'Error', message: S('id-template-missing', { name: String(block['id-template'] || '') }) });
          STATE.personDraft[kind] = { prefill: {}, photo: null, images: [], note: null };
        } else {
          STATE.idFlow[kind] = { tpl, sideCanvas: {}, results: null, rawQr: {}, busy: false };
        }
        render();
      } else if (choice === 'plain') {
        STATE.personDraft[kind] = { prefill: {}, photo: null, images: [], note: null };
        render();
      }
    } }, S(kind === 'beneficiary' ? 'btn-new-beneficiary' : 'btn-new-donor')));
    card.appendChild(actions);
    wrap.appendChild(card);
    return wrap;
  }

  if (STATE.idFlow[kind]) {
    const host = el('div');
    card.appendChild(host);
    buildIdFlowCard(kind, host);
    wrap.appendChild(card);
    return wrap;
  }

  if (draft && draft.note) card.appendChild(el('div', { style: { marginBottom: '12px' } }, noteEl('success', draft.note)));
  if (draft && draft.photo) {
    card.appendChild(el('img', { src: draft.photo, style: { maxWidth: '130px', maxHeight: '170px', borderRadius: '8px', border: '1px solid var(--border)', marginBottom: '12px' } }));
  }
  const form = buildConfigForm(block.fields || []);
  if (draft && draft.prefill) form.setValues(draft.prefill);
  card.appendChild(form.root);
  const actions = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const cancelBtn = el('button', { className: 'kb-btn kb-btn--ghost', onClick: () => { STATE.personDraft[kind] = null; render(); } }, S('cancel'));
  const saveBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: async () => {
    if (!form.validate()) return;
    saveBtn.disabled = true;
    try {
      const extras = { photo: draft && draft.photo || null, images: draft && draft.images || [] };
      const entry = await savePerson(kind, form.getValues(), block.fields || [], extras);
      STATE.personDraft[kind] = null;
      render();
      await kbAlert({ title: entry.id, message: S('person-saved', { id: entry.id }), icon: KB_ICON.info });
    } catch (e) {
      console.error(e);
      saveBtn.disabled = false;
      await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
    }
  } }, S('save'));
  if (idMode) actions.appendChild(cancelBtn);
  actions.append(el('div', { className: 'spacer' }), saveBtn);
  card.appendChild(actions);
  wrap.appendChild(card);
  return wrap;
}

/* ── Money tabs (Donation / Disbursement) ────────────────────────────────── */
function buildMoneyTab(kind) {
  const wrap = el('div', { className: 'fl-tab-body' });
  if (!STATE.ledger) { wrap.appendChild(noteEl('info', S('not-connected-note'))); return wrap; }
  const block = STATE.ledger.config[kind] || {};
  const fields = block.fields || [];
  const personKind = kind === 'donation' ? 'donor' : 'beneficiary';
  const persons = personKind === 'donor' ? idx().donors : idx().beneficiaries;
  const langs = STATE.ledger.config.languages || [];

  // Post-save panel
  const last = STATE.lastSaved[kind];
  if (last) {
    const done = el('div', { className: 'kb-card' });
    done.appendChild(el('div', { className: 'kb-card__title' }, S('documents-title')));
    done.appendChild(el('div', { style: { marginBottom: '10px' } }, noteEl('success', S('record-saved', { reference: last.reference }))));
    if (last.docs.length) {
      const bar = el('div', { className: 'kb-actbar' });
      bar.appendChild(el('button', { className: 'kb-btn kb-btn--soft', onClick: () => printHtml(last.docs[0].html) }, S('btn-reprint')));
      done.appendChild(bar);
    }
    wrap.appendChild(done);
  }

  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S(kind === 'donation' ? 'tab-donation' : 'tab-disbursement')));
  if (!persons.length) {
    card.appendChild(noteEl('warning', S('need-persons-first', { kind: S('kind-' + personKind) })));
    wrap.appendChild(card);
    return wrap;
  }

  // Language selector (always shown when languages are defined, to choose document language)
  if (langs.length >= 1) {
    const curCode = STATE.lang[kind] || langs[0].code;
    const row = el('div', { style: { marginBottom: '12px' } });
    const sel = el('select', { className: 'kb-select' });
    langs.forEach(l => {
      const o = el('option', { value: l.code }, l.name + (l.code !== l.name ? ' (' + l.code + ')' : ''));
      if (l.code === curCode) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => { STATE.lang[kind] = sel.value; });
    row.appendChild(field(S('select-language'), sel));
    card.appendChild(row);
  }

  const form = buildConfigForm(fields);
  card.appendChild(form.root);
  const actions = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const saveBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: async () => {
    if (!form.validate()) return;
    saveBtn.disabled = true;
    try {
      const res = await saveMoneyRecord(kind, form);
      STATE.lastSaved[kind] = res;
      render();
      if (res.docs.length) printHtml(res.docs[0].html);
    } catch (e) {
      console.error(e);
      saveBtn.disabled = false;
      await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
    }
  } }, S('btn-save-record'));
  actions.append(el('div', { className: 'spacer' }), saveBtn);
  card.appendChild(actions);
  wrap.appendChild(card);
  return wrap;
}

/* ── Configuration tab ───────────────────────────────────────────────────── */
function buildConfigTab() {
  const wrap = el('div', { className: 'fl-tab-body' });
  if (!STATE.ledger) { wrap.appendChild(noteEl('info', S('not-connected-note'))); return wrap; }

  // Deep working copy — editors mutate this; Save writes it to config.yml.
  const work = JSON.parse(JSON.stringify(STATE.ledger.config));

  // Template sections register a repaint function here so languagesSection can
  // trigger them when languages are added or removed.
  const tplRepaint = {};
  const card = el('div', { className: 'kb-card' });
  card.appendChild(el('div', { className: 'kb-card__title' }, S('config-title')));
  card.appendChild(el('p', { className: 'fl-muted', style: { marginBottom: '12px' } }, S('cfg-intro')));

  const FIELD_TYPES = ['text', 'textarea', 'date', 'number', 'drop-down', 'random-generator', 'reference'];
  const CORE_KEYS = ['fieldname', 'label', 'type'];

  function inp(value, onInput, cls) {
    const i = el('input', { className: cls || 'kb-input', value: value == null ? '' : String(value) });
    i.addEventListener('input', () => onInput(i.value));
    return i;
  }

  // Fund & currency
  function fundSection() {
    const box = el('div');
    work.fund = work.fund || {};
    const grid = el('div', { className: 'kb-grid cols-2' });
    grid.append(
      field(S('fund-name'), inp(work.fund.name, v => { work.fund.name = v; })),
      field(S('currency-code'), inp(work.fund['currency-code'], v => { work.fund['currency-code'] = v; })),
      field(S('currency-symbol'), inp(work.fund['currency-symbol'], v => { work.fund['currency-symbol'] = v; })));
    const posSel = el('select', { className: 'kb-select' });
    [['before', S('pos-before')], ['after', S('pos-after')]].forEach(([v, labText]) => {
      const o = el('option', { value: v }, labText);
      if ((work.fund['currency-position'] || 'before') === v) o.selected = true;
      posSel.appendChild(o);
    });
    posSel.addEventListener('change', () => { work.fund['currency-position'] = posSel.value; });
    grid.appendChild(field(S('currency-position'), posSel));
    box.appendChild(grid);
    return box;
  }

  // Entry modes
  function modesSection() {
    const box = el('div');
    const grid = el('div', { className: 'kb-grid cols-2' });
    ['beneficiary', 'donor'].forEach(kind => {
      work[kind] = work[kind] || {};
      const sel = el('select', { className: 'kb-select' });
      [['plaintext', S('mode-plaintext')], ['idcardreader', S('mode-idcard')]].forEach(([v, labText]) => {
        const o = el('option', { value: v }, labText);
        if ((work[kind].mode || 'plaintext') === v) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => { work[kind].mode = sel.value; });
      grid.appendChild(field(S('mode-for', { kind: S('tab-' + kind) }), sel));
      grid.appendChild(field(S('id-template-for', { kind: S('tab-' + kind) }), inp(work[kind]['id-template'], v => { work[kind]['id-template'] = v; })));
      grid.appendChild(field(S('tab-' + kind) + ' display-ID field', inp(work[kind]['display-id'] || '', v => { work[kind]['display-id'] = v.trim() || undefined; })));
    });
    box.appendChild(grid);
    return box;
  }

  // Languages editor
  function languagesSection() {
    const box = el('div');
    work.languages = work.languages || [];
    const host = el('div');
    box.appendChild(host);
    function repaintLangs() {
      host.innerHTML = '';
      work.languages.forEach((lang, i) => {
        const row = el('div', { className: 'fl-fieldrow' });
        row.appendChild(field(S('lang-code'),       inp(lang.code,                 v => { lang.code = v.trim(); })));
        row.appendChild(field(S('lang-name'),       inp(lang.name,                 v => { lang.name = v; })));
        row.appendChild(field(S('lang-direction'),  inp(lang.direction || '',      v => { if (v.trim()) lang.direction = v.trim(); else delete lang.direction; })));
        row.appendChild(field(S('lang-lineheight'), inp(lang['line-height'] != null ? String(lang['line-height']) : '', v => {
          const n = parseFloat(v); if (!isNaN(n)) lang['line-height'] = n; else delete lang['line-height'];
        })));
        row.appendChild(field(S('lang-font'),       inp(lang.font || '',           v => { if (v.trim()) lang.font = v.trim(); else delete lang.font; })));
        const rm = el('button', { type: 'button', className: 'kb-circbtn kb-circbtn--rm', title: S('remove'),
          onClick: () => { work.languages.splice(i, 1); repaintLangs(); Object.values(tplRepaint).forEach(fn => fn && fn()); } }, '✕');
        row.appendChild(el('div', { style: { paddingTop: '22px' } }, rm));
        host.appendChild(row);
      });
    }
    repaintLangs();
    const bar = el('div', { className: 'kb-actbar', style: { marginTop: '10px' } });
    bar.appendChild(el('button', { className: 'kb-btn kb-btn--dashed',
      onClick: () => { work.languages.push({ code: '', name: '' }); repaintLangs(); Object.values(tplRepaint).forEach(fn => fn && fn()); } }, S('add-language')));
    box.appendChild(bar);
    return box;
  }

  // Template + signatures editor for money record types
  function templateSection(blockKey) {
    const box = el('div');
    work[blockKey] = work[blockKey] || {};

    // Build token lists (field tokens depend on work[blockKey].fields, not on languages)
    const personKind = blockKey === 'donation' ? 'donor' : 'beneficiary';
    const td = (token, desc) => ({ token, desc });
    function buildCommonTokens() {
      const common = [
        td(personKind + '-name', 'Full name of the linked ' + personKind),
        td(personKind + '-id',   'ID of the linked ' + personKind),
        td('fund-name',       'Name of the fund'),
        td('reference',       'Record reference number'),
        td('amount',          'Formatted amount with currency'),
        td('generated-date',  'Date the document was generated'),
      ];
      (work[blockKey].fields || []).forEach(f => {
        if (f.fieldname) common.push(td(f.fieldname, f.label || f.fieldname));
      });
      return common;
    }

    // Helper: label row with "Available tokens" link
    function fieldWithLink(labelText, tokenList, input) {
      const f = el('div', { className: 'kb-field' });
      const hdr = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' } });
      hdr.appendChild(el('span', { className: 'kb-label' }, labelText));
      const link = el('button', { type: 'button', style: {
        background: 'none', border: 'none', padding: '0', cursor: 'pointer',
        color: 'var(--accent)', fontSize: 'var(--fs-small)', textDecoration: 'underline' },
        onClick: () => showTokensModal(tokenList) }, S('available-tokens'));
      hdr.appendChild(link);
      f.append(hdr, input);
      return f;
    }

    // Signatures count (static — doesn't change with languages)
    const sigGrid = el('div', { className: 'kb-grid cols-2', style: { marginBottom: '12px' } });
    const sigSel = el('select', { className: 'kb-select' });
    [['1', '1'], ['2', '2']].forEach(([v, lab]) => {
      const o = el('option', { value: v }, lab);
      if (String(work[blockKey].signatures || 1) === v) o.selected = true;
      sigSel.appendChild(o);
    });
    sigSel.addEventListener('change', () => { work[blockKey].signatures = parseInt(sigSel.value); });
    sigGrid.appendChild(field('Signatures', sigSel));
    box.appendChild(sigGrid);

    // Dynamic host — sig labels + template textareas; rebuilt when languages change
    const dynHost = el('div');
    box.appendChild(dynHost);

    function repaintContent() {
      dynHost.innerHTML = '';
      const langs = work.languages || [];
      const effectiveLangs = langs.length >= 2 ? langs : (langs.length === 1 ? langs : [{ code: null, name: '' }]);
      const commonTokens = buildCommonTokens();
      const sigTokenDefs = commonTokens;
      const tplTokenDefs = [...commonTokens,
        td('logo',       'Fund logo image (from assets/logo.*)'),
        td('signatures', 'Signature block(s) as configured'),
      ];

      // Signature labels (one textarea per language, or single if ≤1 language)
      const labelHost = el('div', { style: { marginBottom: '12px' } });
      effectiveLangs.forEach(lang => {
        const rawLabels = (() => {
          const sl = work[blockKey]['signature-labels'];
          if (!sl) return [];
          if (Array.isArray(sl)) return sl;
          if (lang.code && typeof sl === 'object') return sl[lang.code] || [];
          return [];
        })();
        const prefix = langs.length >= 2 ? lang.name + ' · ' : '';
        const ta = el('textarea', { className: 'kb-textarea fl-mono', rows: 3,
          placeholder: 'One label per line' });
        ta.value = rawLabels.join('\n');
        ta.addEventListener('input', () => {
          const vals = ta.value.split('\n').map(s => s.trimEnd()).filter((_, i, a) => i < a.length - 1 || s.trim());
          if (langs.length >= 2) {
            if (typeof work[blockKey]['signature-labels'] !== 'object' || Array.isArray(work[blockKey]['signature-labels']))
              work[blockKey]['signature-labels'] = {};
            work[blockKey]['signature-labels'][lang.code] = vals;
          } else {
            work[blockKey]['signature-labels'] = vals;
          }
        });
        labelHost.appendChild(fieldWithLink(prefix + 'Signature labels', sigTokenDefs, ta));
      });
      dynHost.appendChild(labelHost);

      // Template textarea(s)
      effectiveLangs.forEach(lang => {
        const curTpl = (() => {
          const t = work[blockKey].template;
          if (!t) return '';
          if (typeof t === 'string') return t;
          if (lang.code && typeof t === 'object') return t[lang.code] || '';
          return Object.values(t)[0] || '';
        })();
        const labelText = S('cfg-template') + (langs.length >= 2 ? ' — ' + lang.name + ' (' + lang.code + ')' : '');
        const ta = el('textarea', { className: 'kb-textarea fl-mono', rows: 14 });
        ta.value = curTpl;
        ta.addEventListener('input', () => {
          if (langs.length >= 2) {
            if (typeof work[blockKey].template !== 'object' || Array.isArray(work[blockKey].template))
              work[blockKey].template = {};
            work[blockKey].template[lang.code] = ta.value;
          } else {
            work[blockKey].template = ta.value;
          }
        });
        dynHost.appendChild(fieldWithLink(labelText, tplTokenDefs, ta));
      });
    }

    tplRepaint[blockKey] = repaintContent;
    repaintContent();
    return box;
  }

  // Field-list editor for one block
  function fieldsSection(blockKey) {
    const box = el('div');
    work[blockKey] = work[blockKey] || {};
    work[blockKey].fields = work[blockKey].fields || [];
    const listHost = el('div');
    box.appendChild(listHost);

    function extraKeysYaml(f) {
      const extra = {};
      Object.keys(f).forEach(k => { if (!CORE_KEYS.includes(k)) extra[k] = f[k]; });
      return Object.keys(extra).length ? jsyaml.dump(extra, { flowLevel: 1 }).trim() : '';
    }
    function repaint() {
      listHost.innerHTML = '';
      work[blockKey].fields.forEach((f, i) => {
        const row = el('div', { className: 'fl-fieldrow' });
        row.appendChild(field(S('fld-fieldname'), inp(f.fieldname, v => { f.fieldname = v.trim(); })));
        row.appendChild(field(S('fld-label'), inp(f.label, v => { f.label = v; })));
        const typeSel = el('select', { className: 'kb-select' });
        FIELD_TYPES.forEach(t => {
          const o = el('option', { value: t }, t);
          if (String(f.type || 'text').replace(/\s+/g, '-') === t) o.selected = true;
          typeSel.appendChild(o);
        });
        typeSel.addEventListener('change', () => { f.type = typeSel.value; });
        row.appendChild(field(S('fld-type'), typeSel));
        const ta = el('textarea', { className: 'kb-textarea', rows: 2, value: extraKeysYaml(f) });
        ta.addEventListener('change', () => {
          try {
            const extra = ta.value.trim() ? jsyaml.load(ta.value) : {};
            Object.keys(f).forEach(k => { if (!CORE_KEYS.includes(k)) delete f[k]; });
            if (extra && typeof extra === 'object') Object.assign(f, extra);
            ta.classList.remove('is-error');
          } catch (e) { ta.classList.add('is-error'); }
        });
        row.appendChild(field(S('fld-extra'), ta));
        const btns = el('div', { className: 'fl-rowbtns', style: { paddingTop: '22px' } });
        const mk = (txt, title, fn) => {
          const b = el('button', { type: 'button', className: 'kb-circbtn', title, onClick: fn }, txt);
          return b;
        };
        btns.append(
          mk('↑', S('move-up'), () => { if (i > 0) { const a = work[blockKey].fields; [a[i - 1], a[i]] = [a[i], a[i - 1]]; repaint(); } }),
          mk('↓', S('move-down'), () => { const a = work[blockKey].fields; if (i < a.length - 1) { [a[i + 1], a[i]] = [a[i], a[i + 1]]; repaint(); } }),
          mk('✕', S('remove'), () => { work[blockKey].fields.splice(i, 1); repaint(); }));
        btns.lastChild.classList.add('kb-circbtn--rm');
        row.appendChild(btns);
        listHost.appendChild(row);
      });
    }
    repaint();
    const bar = el('div', { className: 'kb-actbar', style: { marginTop: '10px' } });
    bar.appendChild(el('button', { className: 'kb-btn kb-btn--dashed', onClick: () => { work[blockKey].fields.push({ fieldname: '', label: '', type: 'text' }); repaint(); } }, S('add-field')));
    box.appendChild(bar);
    return box;
  }

  // Drop-down lists editor
  function listsSection() {
    const box = el('div');
    work['drop-down-lists'] = work['drop-down-lists'] || [];
    const host = el('div');
    box.appendChild(host);
    function repaint() {
      host.innerHTML = '';
      work['drop-down-lists'].forEach((l, i) => {
        const grid = el('div', { className: 'kb-grid cols-2', style: { marginBottom: '10px' } });
        grid.appendChild(field(S('list-name'), inp(l.name, v => { l.name = v.trim(); })));
        const ta = el('textarea', { className: 'kb-textarea fl-mono', rows: 4, value: (l.values || []).join('\n') });
        ta.addEventListener('input', () => { l.values = ta.value.split('\n').map(s => s.trim()).filter(Boolean); });
        const f2 = field(S('list-values'), ta);
        grid.appendChild(f2);
        const rm = el('button', { type: 'button', className: 'kb-circbtn kb-circbtn--rm', title: S('remove'), onClick: () => { work['drop-down-lists'].splice(i, 1); repaint(); } }, '✕');
        grid.appendChild(el('div', null, rm));
        host.appendChild(grid);
      });
    }
    repaint();
    box.appendChild(el('button', { className: 'kb-btn kb-btn--dashed', onClick: () => { work['drop-down-lists'].push({ name: '', values: [] }); box.replaceWith(listsSection()); } }, S('add-list')));
    return box;
  }

  // Document footer (markdown, optional per-language)
  function footerSection() {
    const box = el('div');
    work.documents = work.documents || {};
    const dynHost = el('div');

    const footerTokenDefs = [
      { token: 'fund-name',      desc: 'Name of the fund' },
      { token: 'reference',      desc: 'Record reference number' },
      { token: 'amount',         desc: 'Formatted amount with currency' },
      { token: 'generated-date', desc: 'Date the document was generated' },
    ];

    function repaint() {
      dynHost.innerHTML = '';
      const langs = work.languages || [];
      const effectiveLangs = langs.length >= 2 ? langs : [{ code: null, name: '' }];
      effectiveLangs.forEach(lang => {
        const cur = (() => {
          const v = work.documents.footer;
          if (!v) return '';
          if (typeof v === 'string') return v;
          if (lang.code && typeof v === 'object') return v[lang.code] || '';
          return Object.values(v)[0] || '';
        })();
        const labelText = 'Document footer' + (langs.length >= 2 ? ' — ' + lang.name + ' (' + lang.code + ')' : '');
        const ta = el('textarea', { className: 'kb-textarea fl-mono', rows: 5 });
        ta.value = cur;
        ta.addEventListener('input', () => {
          if (langs.length >= 2) {
            if (typeof work.documents.footer !== 'object' || Array.isArray(work.documents.footer))
              work.documents.footer = {};
            work.documents.footer[lang.code] = ta.value;
          } else {
            if (ta.value) work.documents.footer = ta.value;
            else delete work.documents.footer;
          }
        });
        const f = el('div', { className: 'kb-field' });
        const hdr = el('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' } });
        hdr.appendChild(el('span', { className: 'kb-label' }, labelText));
        const tokLink = el('button', { type: 'button', style: {
          background: 'none', border: 'none', padding: '0', cursor: 'pointer',
          color: 'var(--accent)', fontSize: 'var(--fs-small)', textDecoration: 'underline' },
          onClick: () => showTokensModal(footerTokenDefs) }, S('available-tokens'));
        hdr.appendChild(tokLink);
        f.append(hdr, ta);
        dynHost.appendChild(f);
      });
    }

    tplRepaint['_footer'] = repaint;
    repaint();
    box.appendChild(dynHost);
    box.appendChild(el('p', { className: 'fl-muted', style: { marginTop: '8px', fontSize: 'var(--fs-small)' } },
      'Markdown appended below every generated receipt, separated by a line. Supports {tokens}. Leave blank for no footer.'));
    return box;
  }

  // Theme (inline mdcms block)
  let themeTa;
  function themeSection() {
    const box = el('div');
    box.appendChild(el('p', { className: 'fl-muted', style: { marginBottom: '8px' } }, S('theme-hint')));
    themeTa = el('textarea', { className: 'kb-textarea fl-mono', rows: 10,
      value: work.theme ? (typeof work.theme === 'object' ? jsyaml.dump(work.theme) : String(work.theme)) : '' });
    box.appendChild(themeTa);
    return box;
  }

  // Raw YAML
  let rawTa, rawNote;
  function rawSection() {
    const box = el('div');
    box.appendChild(el('p', { className: 'fl-muted', style: { marginBottom: '8px' } }, S('raw-hint')));
    rawTa = el('textarea', { className: 'kb-textarea fl-mono', rows: 18, value: jsyaml.dump(work, { lineWidth: 110 }) });
    box.appendChild(rawTa);
    rawNote = el('div', { style: { marginTop: '8px' } });
    box.appendChild(rawNote);
    const bar = el('div', { className: 'kb-actbar', style: { marginTop: '8px' } });
    bar.appendChild(el('button', { className: 'kb-btn kb-btn--soft', onClick: () => {
      rawNote.innerHTML = '';
      try {
        const parsed = jsyaml.load(rawTa.value);
        if (!parsed || typeof parsed !== 'object') throw new Error('not a YAML mapping');
        Object.keys(work).forEach(k => delete work[k]);
        Object.assign(work, parsed);
        rawNote.appendChild(noteEl('success', S('raw-applied')));
        render();   // repaint the structured editors from the new working copy
      } catch (e) { rawNote.appendChild(noteEl('error', S('raw-parse-error', { error: e.message }))); }
    } }, S('btn-apply-raw')));
    box.appendChild(bar);
    return box;
  }

  card.appendChild(makeAccordion([
    { label: S('cfg-fund'),         content: fundSection() },
    { label: S('cfg-languages'),    content: languagesSection() },
    { label: S('cfg-modes'),        content: modesSection() },
    { label: S('cfg-beneficiary'),  content: fieldsSection('beneficiary') },
    { label: S('cfg-donor'),        content: fieldsSection('donor') },
    { label: S('cfg-donation'),     content: fieldsSection('donation') },
    { label: S('cfg-template') + ' — ' + S('tab-donation'),     content: templateSection('donation') },
    { label: S('cfg-disbursement'), content: fieldsSection('disbursement') },
    { label: S('cfg-template') + ' — ' + S('tab-disbursement'), content: templateSection('disbursement') },
    { label: S('cfg-lists'),        content: listsSection() },
    { label: 'Document footer',     content: footerSection() },
    { label: S('cfg-theme'),        content: themeSection() },
    { label: S('cfg-raw'),          content: rawSection() },
  ], { openAllLabel: S('open-all'), closeAllLabel: S('close-all') }));

  const saveNote = el('div', { style: { marginTop: '10px' } });
  const actions = el('div', { className: 'kb-actions', style: { marginTop: '14px' } });
  const saveBtn = el('button', { className: 'kb-btn kb-btn--primary', onClick: async () => {
    saveNote.innerHTML = '';
    // Theme textarea → object / path string / empty.
    const tText = themeTa.value.trim();
    if (!tText) { delete work.theme; }
    else {
      try {
        const parsed = jsyaml.load(tText);
        work.theme = (parsed && typeof parsed === 'object') ? parsed : tText;
      } catch (e) { saveNote.appendChild(noteEl('error', S('theme-parse-error', { error: e.message }))); return; }
    }
    saveBtn.disabled = true;
    try {
      const yamlText = jsyaml.dump(work, { lineWidth: 110 });
      await writeFileText(STATE.ledger.handle, 'config.yml', yamlText);
      STATE.ledger.config = JSON.parse(JSON.stringify(work));
      await appendChangelog('config-updated', '-', 'config.yml saved from the Configuration tab');
      await applyThemeConfig(STATE.ledger.config.theme || CFG.theme);
      await writeLedgerIndex();   // fund name / currency may have changed
      render();
      await kbAlert({ title: S('config-title'), message: S('config-saved'), icon: KB_ICON.info });
    } catch (e) {
      saveBtn.disabled = false;
      await kbAlert({ title: 'Error', message: S('fs-error', { error: e.message }) });
    }
  } }, S('btn-save-config'));
  actions.append(el('div', { className: 'spacer' }), saveBtn);
  card.appendChild(saveNote);
  card.appendChild(actions);
  wrap.appendChild(card);
  return wrap;
}

/* ── Render ──────────────────────────────────────────────────────────────── */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  const wrap = el('div', { className: 'kb-wrap' });
  wrap.append(buildToolbar(), buildHeader());

  const showCfgTab = !STATE.ledger || (STATE.ledger.config['show-config-tab'] !== false && STATE.ledger.config['show-config-tab'] !== 'no');
  const tabDefs = [
    { label: S('tab-dashboard'), content: buildDashboard() },
    { label: S('tab-disbursement'), content: buildMoneyTab('disbursement') },
    { label: S('tab-beneficiary'), content: buildPersonTab('beneficiary') },
    { label: S('tab-donation'), content: buildMoneyTab('donation') },
    { label: S('tab-donor'), content: buildPersonTab('donor') },
    ...(showCfgTab ? [{ label: S('tab-configuration'), content: buildConfigTab() }] : []),
  ];
  if (!showCfgTab && STATE.tab >= tabDefs.length) STATE.tab = 0;
  const tabs = makeTabs(tabDefs, { defaultIndex: STATE.tab });
  // Remember the active tab across re-renders.
  $$('.kb-tab', tabs).forEach((btn, i) => btn.addEventListener('click', () => { STATE.tab = i; }));
  wrap.appendChild(tabs);

  wrap.appendChild(buildFooter());
  app.appendChild(wrap);
  updateThemeIcon();
}

/* ── Boot ────────────────────────────────────────────────────────────────── */
try {
  if (typeof jsyaml === 'undefined') {
    throw new Error('The js-yaml library did not load. Fund Ledger loads its libraries from a CDN, '
      + 'so the first launch (and ID-card extraction) needs an internet connection; afterwards the '
      + 'browser cache usually covers offline use.');
  }
  CFG = readInlineYaml('boot-config');
  assertValidConfig(CFG);
  normaliseConfig();
  applyAccent(CFG);
  await applyThemeConfig(CFG.theme);
  initFontScale();
  lang = localStorage.getItem('fundledger-lang') || CFG['default-code'] || 'en';
  applyLang(lang);
  await Promise.all([loadAppConfig(), tryLoadLogo()]);
  await tryReconnect();   // silent if permission is still granted
  render();
} catch (e) {
  console.error(e);
  document.getElementById('app').innerHTML =
    `<div class="kb-wrap"><div class="kb-note kb-note--error"><span>⚠</span>` +
    `<div><b>Fund Ledger failed to start</b><br>${kbEsc(e.message)}</div></div></div>`;
}
})();
</script>
</body>
</html>
